<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Tokenй©—иӯүv4">
<title>е®ңдҝ®еҫ…иҫҰ вҖ” Token еҲ·ж–°й©—иӯү v4</title>
<style>
  body { font-family: system-ui, -apple-system, "Microsoft JhengHei", sans-serif;
         max-width: 480px; margin: 0 auto; padding: 14px; background: #f5f5f5; }
  .card { background: #fff; border-radius: 12px; padding: 14px; margin-bottom: 10px;
          box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  h1 { font-size: 1.1em; } h2 { font-size: .95em; color: #555; margin: 4px 0 8px; }
  button { padding: 9px 14px; border: none; border-radius: 8px; font-size: .95em;
           cursor: pointer; background: #2e7d32; color: #fff; margin: 2px; }
  button.secondary { background: #757575; }
  .kv { font-size: .88em; line-height: 1.7; }
  .kv b.ok { color: #2e7d32; } .kv b.warn { color: #E65100; } .kv b.err { color: #c62828; }
  #logBox { font-size: .78em; white-space: pre-wrap; background: #263238; color: #B2DFDB;
            border-radius: 8px; padding: 8px; max-height: 200px; overflow-y: auto; }
</style>
</head>
<body>
<h1>Token еҲ·ж–°й©—иӯү v4пјҲiPhone дё»з•«йқўжЁЎејҸеҜҰжё¬з”Ёпјү</h1>

<div class="card">
  <h2>в‘  зӢҖж…Ӣ</h2>
  <div class="kv">
    еҹ·иЎҢжЁЎејҸпјҡ<b id="stMode">пјҚ</b><br>
    зҷ»е…Ҙпјҡ<b id="stUser">жңӘзҷ»е…Ҙ</b><br>
    Drive зҘЁйҪЎпјҡ<b id="stAge">пјҚ</b><br>
    refresh_tokenпјҡ<b id="stRT">пјҚ</b>
  </div>
  <div style="margin-top:8px">
    <button id="loginBtn" onclick="signIn()">Google зҷ»е…Ҙ</button>
    <button id="reAuthBtn" class="secondary" onclick="signIn()" style="display:none">йҮҚж–°зҷ»е…ҘеҸ–зҘЁ</button>
    <button class="secondary" onclick="signOut()">зҷ»еҮә</button>
  </div>
</div>

<div class="card">
  <h2>в‘Ў еҲ·ж–°жё¬и©Ұ</h2>
  <button onclick="forceRefresh()">еј·еҲ¶еҲ·ж–°зҘЁпјҲе‘јеҸ« Edge Functionпјү</button>
</div>

<div class="card">
  <h2>в‘ў дёҠеӮіжё¬и©ҰпјҲиҮӘеӢ•зўәдҝқзҘЁжңүж•Ҳпјү</h2>
  <input type="file" id="photoInput" accept="image/*">
  <button onclick="uploadWithFreshToken()">дёҠеӮіеҲ° Drive</button>
</div>

<div class="card"><h2>ж—ҘиӘҢ</h2><div id="logBox"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ====== жё¬и©ҰзүҲеёёж•ё ====== */
const SUPABASE_URL = "https://vzrnkzokushqhixngrsi.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_iCAX3ygzF5s0gVMBy7eqmw_CNs78Cf_";
const REFRESH_BEFORE_MIN = 50;   // зҘЁйҪЎи¶…йҒҺ 50 еҲҶйҗҳиҰ–зӮәе°ҮйҒҺжңҹ,е…ҲжҸӣеҶҚз”Ё
/* ======================= */

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = id => document.getElementById(id);
const logLine = m => { const b = $("logBox");
  b.textContent = new Date().toLocaleTimeString('zh-TW',{hour12:false}) + " " + m + "\n" + b.textContent; };

// ---- иҝ·дҪ  IndexedDB(еҗҢ v3) ----
let _kvDb = null;
function kvOpen(){ if(_kvDb) return Promise.resolve(_kvDb);
  return new Promise((res,rej)=>{ const q=indexedDB.open('tok4-kv',1);
    q.onupgradeneeded=()=>q.result.createObjectStore('kv');
    q.onsuccess=()=>{_kvDb=q.result;res(_kvDb);}; q.onerror=()=>rej(q.error); }); }
async function kvGet(k){ const d=await kvOpen();
  return new Promise((res,rej)=>{ const r=d.transaction('kv','readonly').objectStore('kv').get(k);
    r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
async function kvSet(k,v){ const d=await kvOpen();
  return new Promise((res,rej)=>{ const r=d.transaction('kv','readwrite').objectStore('kv').put(v,k);
    r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }); }

// ---- зҘЁеӢҷдёӯеҝғ ----
// tok = { access_token, issued_at(ms), refresh_token }
async function getTok(){ return await kvGet('tok') || null; }
async function setTok(t){ await kvSet('tok', t); paintStatus(); }

function ageMin(t){ return t?.issued_at ? (Date.now()-t.issued_at)/60000 : Infinity; }

async function paintStatus(){
  $("stMode").textContent = window.matchMedia('(display-mode: standalone)').matches
    ? 'дё»з•«йқў(standalone) вң” йҖҷе°ұжҳҜиҰҒеҜҰжё¬зҡ„жЁЎејҸ' : 'зҖҸиҰҪеҷЁеҲҶй Ғ';
  const t = await getTok();
  const a = ageMin(t);
  $("stAge").innerHTML = t?.access_token
    ? `<b class="${a>REFRESH_BEFORE_MIN?'warn':'ok'}">${a===Infinity?'?':a.toFixed(0)} еҲҶйҗҳ${a>REFRESH_BEFORE_MIN?'(е°ҮйҒҺжңҹ)':''}</b>`
    : '<b class="err">з„ЎзҘЁ</b>';
  $("stRT").innerHTML = t?.refresh_token ? '<b class="ok">вң” е·Ідҝқеӯҳ</b>' : '<b class="err">вңҳ з„Ў(йңҖйҮҚж–°зҷ»е…ҘеҸ–еҫ—)</b>';
}

// ж ёеҝғ: зўәдҝқжүӢдёҠжңү 50 еҲҶйҗҳе…§зҡ„жҙ»зҘЁ;дёҚеӨ ж–°е°ұз¶“ Edge Function жҸӣ
async function ensureFreshToken(){
  let t = await getTok();
  if (t?.access_token && ageMin(t) < REFRESH_BEFORE_MIN) return t.access_token;
  if (!t?.refresh_token) throw new Error('жІ’жңү refresh_token,и«ӢйҮҚж–°зҷ»е…ҘдёҖж¬Ў');
  logLine('зҘЁйҪЎ ' + (ageMin(t)===Infinity?'?':ageMin(t).toFixed(0)) + ' еҲҶ,е‘јеҸ« Edge Function жҸӣж–°зҘЁвҖҰ');
  const { data, error } = await db.functions.invoke('refresh-drive-token',
    { body: { refresh_token: t.refresh_token } });
  if (error) throw new Error('еҲ·ж–°еӨұж•—: ' + error.message + '(иӢҘзӮә 401 invalid_grant и«ӢйҮҚж–°зҷ»е…Ҙ)');
  t = { ...t, access_token: data.access_token, issued_at: Date.now() };
  await setTok(t);
  logLine('вң” жҸӣзҘЁжҲҗеҠҹ(ж•Ҳжңҹ ' + Math.round((data.expires_in||3600)/60) + ' еҲҶ)');
  return t.access_token;
}

async function forceRefresh(){
  try {
    const t = await getTok();
    if (!t?.refresh_token) { logLine('вңҳ з„Ў refresh_token'); return; }
    await setTok({ ...t, issued_at: 0 });          // еј·еҲ¶иҰ–зӮәйҒҺжңҹ
    await ensureFreshToken();
  } catch(e){ logLine('вңҳ ' + e.message); }
}

// ---- дёҠеӮі(еЈ“зё®з•Ҙ,зӣҙжҺҘеҺҹжӘ”е°Ҹең–еҚіеҸҜй©—иӯүзҘЁ) ----
async function uploadWithFreshToken(){
  const f = $("photoInput").files[0];
  if (!f) { logLine('и«Ӣе…ҲйҒёз…§зүҮ'); return; }
  try {
    const token = await ensureFreshToken();
    const meta = { name: 'е®ңдҝ®tokжё¬_' + Date.now() + '.jpg', mimeType: f.type || 'image/jpeg' };
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
    form.append('file', f);
    const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name',
      { method: 'POST', headers: { Authorization: 'Bearer ' + token }, body: form });
    if (!r.ok) throw new Error('HTTP ' + r.status + ' ' + await r.text());
    const d = await r.json();
    logLine('вң” дёҠеӮіжҲҗеҠҹ: ' + d.name + ' (ID ' + d.id.slice(0,10) + 'вҖҰ)');
  } catch(e){ logLine('вңҳ дёҠеӮіеӨұж•—: ' + e.message); }
}

// ---- иӘҚиӯү ----
async function signIn(){
  await db.auth.signInWithOAuth({ provider: 'google', options: {
    redirectTo: location.origin + location.pathname,
    scopes: 'https://www.googleapis.com/auth/drive.file',
    queryParams: { access_type: 'offline', prompt: 'consent' }   // consent зўәдҝқжҜҸж¬ЎйғҪзҷј refresh_token
  }});
}
async function signOut(){ await db.auth.signOut(); location.reload(); }

async function init(){
  paintStatus();
  const { data: { session } } = await db.auth.getSession();
  if (!session) { logLine('жңӘзҷ»е…Ҙ'); return; }
  $("stUser").textContent = session.user.email;
  $("loginBtn").style.display = 'none';
  // зҷ»е…ҘиҗҪең°з•¶дёӢ: дҝқеӯҳе…©ејөзҘЁ(access + refresh)
  if (session.provider_token) {
    const old = await getTok() || {};
    await setTok({
      access_token: session.provider_token,
      issued_at: Date.now(),
      refresh_token: session.provider_refresh_token || old.refresh_token || null
    });
    logLine('зҷ»е…ҘеҸ–еҫ—ж–°зҘЁ' + (session.provider_refresh_token ? '+refresh_token' : '(жңӘйҷ„ refresh_token,жІҝз”ЁиҲҠеӯҳ)'));
  }
  paintStatus();
  const t = await getTok();
  $("reAuthBtn").style.display = (t?.refresh_token) ? 'none' : 'inline-block';
  setInterval(paintStatus, 30000);   // зҘЁйҪЎйЎҜзӨәжҜҸ 30 з§’жӣҙж–°
}
db.auth.onAuthStateChange((_e,s)=>{ if(s && $("loginBtn").style.display!=='none') init(); });
init();
</script>
</body>
</html>
