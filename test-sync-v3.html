<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宜修待辦 — 同步引擎驗證 v3</title>
<style>
  body { font-family: system-ui, -apple-system, "Microsoft JhengHei", sans-serif;
         max-width: 520px; margin: 0 auto; padding: 12px; background: #f5f5f5; }
  .card { background: #fff; border-radius: 12px; padding: 14px; margin-bottom: 10px;
          box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  h1 { font-size: 1.1em; } h2 { font-size: .95em; color: #555; margin: 4px 0 8px; }
  button { padding: 8px 14px; border: none; border-radius: 8px; font-size: .95em;
           cursor: pointer; background: #2e7d32; color: #fff; margin: 2px; }
  button.secondary { background: #757575; }
  button.danger { background: #c62828; }
  input[type=text] { padding: 9px; border: 1px solid #ccc; border-radius: 8px;
          font-size: .95em; width: 100%; box-sizing: border-box; margin-bottom: 6px; }
  ul { padding-left: 4px; list-style: none; margin: 8px 0; max-height: 300px; overflow-y: auto; }
  li { padding: 7px 8px; border-bottom: 1px solid #eee; display: flex;
       justify-content: space-between; align-items: center; gap: 8px; }
  li .t { flex: 1; } li .pending-mark { color: #E65100; font-size: .8em; }
  li button { padding: 3px 8px; font-size: .8em; }
  .statusbar { display: flex; gap: 10px; flex-wrap: wrap; font-size: .82em; color: #444;
               background: #ECEFF1; border-radius: 8px; padding: 8px; }
  .statusbar b.ok { color: #2e7d32; } .statusbar b.warn { color: #E65100; }
  #logBox { font-size: .78em; white-space: pre-wrap; background: #263238; color: #B2DFDB;
            border-radius: 8px; padding: 8px; max-height: 160px; overflow-y: auto; }
  label.sw { font-size: .85em; display: inline-flex; align-items: center; gap: 4px; }
</style>
</head>
<body>
<h1>宜修待辦 — 同步引擎驗證 v3</h1>

<div class="card">
  <div class="statusbar">
    <span>登入：<b id="stUser">－</b></span>
    <span>網路：<b id="stNet" class="ok">－</b></span>
    <span>佇列：<b id="stQueue">0</b></span>
    <span>上次同步：<b id="stSync">從未</b></span>
    <span>本地筆數：<b id="stCount">0</b></span>
    <span>紀元：<b id="stGen">－</b></span>
  </div>
  <div style="margin-top:8px">
    <button id="loginBtn" onclick="signIn()">Google 登入</button>
    <button class="secondary" onclick="syncNow('manual')">立即同步</button>
    <button class="secondary" onclick="fullResync('manual_reset')">全量重拉</button>
    <label class="sw"><input type="checkbox" id="simOffline" onchange="logLine('模擬離線: '+(this.checked?'開':'關'))">模擬離線</label>
  </div>
</div>

<div class="card">
  <h2>任務（畫面只讀本地・零閃爍）</h2>
  <input type="text" id="newTitle" placeholder="新增任務（離線也可）">
  <button onclick="addTask()">新增</button>
  <ul id="list"></ul>
</div>

<div class="card">
  <h2>引擎日誌</h2>
  <div id="logBox"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ---------- 迷你 IndexedDB 幫手(取代 idb-keyval,零外部依賴) ---------- */
let _kvDb = null;
function kvOpen() {
  if (_kvDb) return Promise.resolve(_kvDb);
  return new Promise((res, rej) => {
    const req = indexedDB.open('sync3-kv', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('kv');
    req.onsuccess = () => { _kvDb = req.result; res(_kvDb); };
    req.onerror = () => rej(req.error);
  });
}
async function kvGet(key) {
  const d = await kvOpen();
  return new Promise((res, rej) => {
    const r = d.transaction('kv','readonly').objectStore('kv').get(key);
    r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
  });
}
async function kvSet(key, val) {
  const d = await kvOpen();
  return new Promise((res, rej) => {
    const r = d.transaction('kv','readwrite').objectStore('kv').put(val, key);
    r.onsuccess = () => res(); r.onerror = () => rej(r.error);
  });
}
</script>
<script>
/* ====== 測試版常數 ====== */
const SUPABASE_URL = "https://vzrnkzokushqhixngrsi.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_iCAX3ygzF5s0gVMBy7eqmw_CNs78Cf_";
/* ======================= */

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = id => document.getElementById(id);
const logLine = m => { const b = $("logBox");
  b.textContent = new Date().toLocaleTimeString('zh-TW',{hour12:false}) + " " + m + "\n" + b.textContent;
};

// ---------- 引擎狀態(記憶體鏡像,啟動時自 IndexedDB 載入) ----------
let tasks = new Map();      // id -> row(含 deleted)
let queue = [];             // [{op:'upsert'|'del', id, data, tries}]
let lastSync = null;        // 水位線(伺服器 updated_at 最大值)
let dataGen = null;         // 本地已知紀元
let pushing = false, pulling = false;
const genUUID = () => crypto.randomUUID();

async function loadLocal() {
  tasks = new Map(await kvGet('sync3:tasks') || []);
  queue = await kvGet('sync3:queue') || [];
  lastSync = await kvGet('sync3:lastSync') || null;
  dataGen = await kvGet('sync3:gen') ?? null;
  render(); paintStatus();
}
const saveTasks = () => kvSet('sync3:tasks', [...tasks.entries()]);
const saveQueue = () => kvSet('sync3:queue', queue);

// ---------- 畫面(單一真相源:只讀本地;就地重畫,永不清空等待) ----------
function render() {
  const pendingIds = new Set(queue.map(q => q.id));
  const alive = [...tasks.values()].filter(t => !t.deleted)
    .sort((a,b) => (b.updated_at||'').localeCompare(a.updated_at||''));
  $("list").innerHTML = alive.slice(0, 60).map(t =>
    `<li><span class="t">${esc(t.title)} <small style="color:#888">(${esc(t.status)})</small>
       ${pendingIds.has(t.id) ? '<span class="pending-mark">●待推送</span>' : ''}</span>
       <button class="secondary" onclick="toggleDone('${t.id}')">${t.status==='Done'?'重開':'完成'}</button>
       <button class="danger" onclick="softDelete('${t.id}')">刪</button></li>`).join("")
    || "<li><i>沒有任務</i></li>";
  $("stCount").textContent = alive.length;
}
const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
function paintStatus() {
  $("stQueue").textContent = queue.length;
  $("stSync").textContent = lastSync ? lastSync.replace('T',' ').slice(5,19) : '從未';
  $("stGen").textContent = dataGen ?? '－';
  const off = $("simOffline").checked || !navigator.onLine;
  $("stNet").textContent = off ? '離線' : '連線';
  $("stNet").className = off ? 'warn' : 'ok';
}

// ---------- 本地寫入(樂觀更新:先寫本地+進佇列,畫面即時) ----------
function localWrite(row) {
  tasks.set(row.id, row); saveTasks();
  queue.push({ op:'upsert', id: row.id, data: row, tries: 0 }); saveQueue();
  render(); paintStatus();
  pushSoon();
}
function addTask() {
  const title = $("newTitle").value.trim(); if (!title) return;
  $("newTitle").value = '';
  localWrite({ id: genUUID(), title, category:'', status:'Pending', priority:99,
    note:'', customer:'', customer_hint:'', photos:[], deleted:false,
    updated_at: new Date().toISOString() });
  logLine('本地新增(進佇列)');
}
function toggleDone(id) {
  const t = tasks.get(id); if (!t) return;
  localWrite({ ...t, status: t.status==='Done'?'Pending':'Done',
               updated_at: new Date().toISOString() });
}
function softDelete(id) {
  const t = tasks.get(id); if (!t) return;
  localWrite({ ...t, deleted: true, updated_at: new Date().toISOString() });
  logLine('本地軟刪除(進佇列)');
}

// ---------- 推送(佇列依序;指數退避;上限後留佇列) ----------
let pushTimer = null;
function pushSoon(delay = 300) { clearTimeout(pushTimer); pushTimer = setTimeout(pushQueue, delay); }
async function pushQueue() {
  if (pushing || !queue.length) return;
  if ($("simOffline").checked || !navigator.onLine) { logLine('離線,佇列保留 '+queue.length+' 筆'); return; }
  pushing = true;
  try {
    while (queue.length) {
      const item = queue[0];
      const payload = { ...item.data };
      delete payload.updated_at;          // 時間戳交給伺服器觸發器(單一權威時鐘)
      delete payload.created_at; delete payload.owner_id;
      const { data, error } = await db.from('tasks')
        .upsert(payload, { onConflict: 'id' }).select().single();
      if (error) {
        item.tries++;
        const wait = Math.min(30000, 1000 * 2 ** item.tries);
        logLine('推送失敗(第'+item.tries+'次): '+error.message+',於 '+(wait/1000)+'s 後重試');
        saveQueue(); pushing = false; pushSoon(wait); paintStatus(); return;
      }
      // 成功:以伺服器回傳版本回寫本地(取得權威 updated_at)
      tasks.set(data.id, data);
      queue.shift(); saveQueue(); saveTasks();
      logLine('推送成功: '+data.title.slice(0,12));
    }
    render(); paintStatus();
    pullDelta('after_push');
  } finally { pushing = false; }
}

// ---------- 拉取(增量;合併式;佇列保護;時間戳單向閘門) ----------
async function pullDelta(reason) {
  if (pulling) return;
  if ($("simOffline").checked || !navigator.onLine) return;
  pulling = true;
  try {
    if (!(await checkGeneration())) return;   // 紀元不符 → 內部已轉全量
    let q = db.from('tasks').select('*').order('updated_at', { ascending: true }).limit(1000);
    q = lastSync ? q.gt('updated_at', lastSync) : q.eq('deleted', false);  // 首拉不需要墓碑
    const { data, error } = await q;
    if (error) { logLine('拉取失敗: '+error.message); return; }
    if (!data.length) { logLine('拉取('+reason+'): 無變更'); return; }
    const pendingIds = new Set(queue.map(x => x.id));
    let merged = 0, shielded = 0;
    for (const row of data) {
      if (pendingIds.has(row.id)) { shielded++; continue; }            // 佇列保護
      const local = tasks.get(row.id);
      if (local && (local.updated_at||'') >= row.updated_at) continue; // 單向閘門
      tasks.set(row.id, row); merged++;
    }
    lastSync = data[data.length-1].updated_at;
    await kvSet('sync3:lastSync', lastSync); saveTasks();
    render(); paintStatus();
    logLine('拉取('+reason+'): 收 '+data.length+' 筆,合併 '+merged+(shielded?(',佇列保護 '+shielded):''));
  } finally { pulling = false; }
}

// ---------- 紀元檢測(還原偵測 → 自動全量重拉) ----------
async function checkGeneration() {
  const { data, error } = await db.from('user_settings').select('data_generation').maybeSingle();
  if (error) { logLine('紀元讀取失敗: '+error.message); return true; }
  let gen = data?.data_generation;
  if (gen == null) {   // 首次:建立自己的設定列
    const ins = await db.from('user_settings').upsert({ data_generation: 1 }).select().single();
    gen = ins.data?.data_generation ?? 1;
  }
  if (dataGen === null) { dataGen = gen; await kvSet('sync3:gen', gen); return true; }
  if (gen !== dataGen) {
    logLine('⚠ 偵測到還原(紀元 '+dataGen+'→'+gen+'),放棄本地全量重拉');
    dataGen = gen; await kvSet('sync3:gen', gen);
    await fullResync('generation_change');
    return false;
  }
  return true;
}
async function fullResync(reason) {
  queue = []; saveQueue();            // 佇列廢棄(紀元事件語意)
  tasks = new Map(); lastSync = null; // 注意:不先清畫面,拉完一次性重畫(零閃爍)
  const { data, error } = await db.from('tasks').select('*').eq('deleted', false)
    .order('updated_at', { ascending: true }).limit(2000);
  if (error) { logLine('全量重拉失敗: '+error.message); return; }
  tasks = new Map(data.map(r => [r.id, r]));
  lastSync = data.length ? data[data.length-1].updated_at : null;
  await kvSet('sync3:lastSync', lastSync); saveTasks();
  db.from('sync_logs').insert({ reason, meta: { rows: data.length } }).then(()=>{});
  render(); paintStatus();
  logLine('全量重拉('+reason+'): '+data.length+' 筆');
}

// ---------- 認證與啟動 ----------
async function signIn() {
  await db.auth.signInWithOAuth({ provider:'google',
    options:{ redirectTo: location.origin + location.pathname } });
}
async function init() {
  await loadLocal();                            // 先畫本地(離線/慢網也秒開)
  const { data: { session } } = await db.auth.getSession();
  if (!session) { logLine('未登入'); return; }
  $("stUser").textContent = session.user.email.split('@')[0];
  $("loginBtn").style.display = 'none';
  pushSoon(100);                                // 先清佇列
  pullDelta(lastSync ? 'startup' : 'first_full');
  setInterval(() => pullDelta('interval'), 60000);   // 週期背景拉(節流 60s)
  window.addEventListener('online', () => { paintStatus(); pushSoon(500); });
  window.addEventListener('offline', paintStatus);
}
db.auth.onAuthStateChange((_e,s)=>{ if(s && $("loginBtn").style.display!=='none') init(); });
init();
</script>
</body>
</html>
