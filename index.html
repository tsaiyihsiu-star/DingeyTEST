<!DOCTYPE html>

<html lang="zh-TW">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="待辦事項">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icon.png">
  <link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==">
  <link rel="manifest" href="manifest.json">
  <title>待辦事項</title>
  <style>
    :root {
      --primary:#007AFF; --red:#FF3B30; --green:#34C759;
      --orange:#FF9500; --gray:#8E8E93; --label:#1C1C1E;
      --bg:#F2F2F7; --card:#FFFFFF; --sep:#3A3A3C;
      --sat:env(safe-area-inset-top,59px);
      --sab:env(safe-area-inset-bottom,34px);
      --sidebar-bg:#1C1C1E;
      --cat-h:48px;
    }
    *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html{height:100%;overflow:hidden;}
    body{
      position:fixed;inset:0;
      display:flex;flex-direction:row;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
      -webkit-font-smoothing:antialiased;
      background:var(--sidebar-bg);
      overscroll-behavior:none;
    }
    #sidebar{
      width:76px;flex-shrink:0;
      height:100dvh;box-sizing:border-box;
      background:var(--sidebar-bg);
      display:flex;flex-direction:column;
      transition:width 0.26s cubic-bezier(.32,.72,0,1);
      overflow:hidden;position:relative;
    }
    #sideGap{flex-shrink:0;height:calc(var(--sat) + 60px);}
    #sideList{
      overflow-y:scroll;overflow-x:hidden;
      -webkit-overflow-scrolling:touch;
      height:calc(100dvh - var(--sat) - 60px - 108px - var(--sab));
      padding:2px 0 8px;
    }
    #sideList::-webkit-scrollbar{display:none;}
    #fab {
      position: fixed;
      top: calc(var(--sat) + 6px);
      left: 14px !important;
      width: 46px;height: 46px;border-radius: 50%;
      background: var(--primary);border: none;
      display: flex;align-items: center;justify-content: center;
      color: #fff;box-shadow: 0 4px 14px rgba(0,122,255,.42);
      cursor: pointer;z-index: 90;transition: transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    #fab:active{transform:scale(.9);}
    .scat {
      position: relative;height: var(--cat-h);
      display: flex;align-items: center;
      justify-content: flex-start !important;
      padding: 0 0 0 14px !important;
      margin: 2px 4px;border-radius: 10px;
      cursor: pointer;overflow: hidden;
      user-select: none;-webkit-user-select: none;
    }
    .scat.active{background:var(--primary);}
    .scat:active{opacity:0.72;}
    .scat-abbr {
      display: block;font-size: 17px;font-weight: 600;
      color: rgba(255,255,255,0.9);white-space: nowrap;
      text-align: left !important;pointer-events: none;
      max-width: 52px;overflow: hidden;text-overflow: ellipsis;
    }
    .scat-label {
      display: none;flex: 1;font-size: 17px;font-weight: 600;
      color: rgba(255,255,255,0.9);white-space: nowrap;
      overflow: hidden;text-overflow: ellipsis;pointer-events: none;
    }
    .scat-count{display:none;font-size:12px;font-weight:500;color:rgba(255,255,255,0.5);margin-left:auto;margin-right:8px;flex-shrink:0;}
    .scat-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;pointer-events:none;}
    .scat-icon.today{background:#FF3B30;}
    .scat-icon.all{background:#007AFF;}
    .scat-icon.done{background:#34C759;}
    .scat-sys .scat-abbr{display:none;}
    .scat-sys .scat-label{display:none;}
    #sidebar.wide .scat-sys .scat-label{display:block;}
    .scat.active .scat-abbr,.scat.active .scat-label{color:#fff;font-weight:800;}
    .scat.active .scat-count{color:rgba(255,255,255,0.75);}
    #sidebar.wide .scat-count{display:block !important;}
    #sidebar.wide .scat-dot{display:none !important;}
    #sidebar.wide .scat-abbr{display:none;}
    #sidebar.wide .scat-label{display:block;}
    .scat-dot{
      position:absolute;top:8px;left:6px;
      width:7px;height:7px;border-radius:50%;
      background:var(--red);display:none;z-index:5;
      box-shadow:0 0 0 2px var(--sidebar-bg);
    }
    .scat-dot.show{display:block;}
    #sideFoot {
      position: fixed;left: 0;bottom: 0;
      width: 76px;
      display: flex;flex-direction: column;
      align-items: flex-start !important;
      gap: 8px;padding: 6px 0 calc(6px + var(--sab)) 14px !important;
      background: var(--sidebar-bg);border-top: 0.5px solid var(--sep);
      z-index: 1;transition: width 0.26s cubic-bezier(.32,.72,0,1);
      overflow: hidden;
    }
    .sbtn{
      margin-left:0 !important;width:44px;height:44px;
      border-radius:12px;background:#2C2C2E;border:none;
      display:flex;align-items:center;justify-content:center;color:#FFFFFF;
    }
    .sbtn:active{opacity:0.65;}
    .sbtn svg{width:20px;height:20px;color:#fff;display:block;stroke:currentColor;}
    #main{flex:1;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;border-radius:16px 16px 0 0;min-width:0;position:relative;z-index:2;overscroll-behavior:none;}
    #mainHeader{
      flex-shrink:0;background:var(--label);border-radius:16px 16px 0 0;
      padding:calc(var(--sat) + 10px) 16px 10px 16px;
      display:flex;align-items:center;gap:10px;
    }
    #vTitle{font-size:22px;font-weight:800;color:#fff;flex:1;margin:0;letter-spacing:-0.3px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    #titleDateInput{display:none;border:none;border-bottom:2px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.15);color:#fff;font-size:15px;font-weight:700;font-family:inherit;outline:none;padding:4px 6px;border-radius:6px 6px 0 0;color-scheme:dark;width:140px;flex-shrink:0;}
    #arrivalBtn{
      flex-shrink:0;padding:6px 14px;background:rgba(255,255,255,0.15);
      border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;
      font-family:inherit;cursor:pointer;letter-spacing:0.3px;
      -webkit-tap-highlight-color:transparent;transition:background .15s;white-space:nowrap;
      user-select:none;-webkit-user-select:none;
    }
    #arrivalBtn:active{background:rgba(255,255,255,0.28);}
    #arrivalBtn.recorded{background:var(--primary);}
    /* 到場記錄下拉 */
    #arrivalDrop{
      display:none;position:fixed;z-index:300;
      background:var(--card);border-radius:12px;
      box-shadow:0 8px 28px rgba(0,0,0,.22);
      min-width:160px;overflow:hidden;
      animation:fadeScaleIn .16s cubic-bezier(.32,.72,0,1);
    }
    #arrivalDrop.open{display:block;}
    .arrival-drop-title{font-size:11px;font-weight:700;color:var(--gray);padding:10px 14px 4px;letter-spacing:0.5px;}
    .arrival-drop-item{padding:10px 14px;font-size:15px;font-weight:500;color:var(--label);border-top:.5px solid #E5E5EA;}
    .arrival-drop-empty{padding:10px 14px;font-size:14px;color:var(--gray);}
    .srch{position:relative;display:flex;align-items:center;justify-content:flex-end;flex-shrink:0;}
    #srchIcon{
      width:36px;height:36px;border-radius:50%;background:transparent;border:none;
      color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:background .15s;flex-shrink:0;position:relative;z-index:1;
      -webkit-tap-highlight-color:transparent;
    }
    #srchIcon:active{background:rgba(255,255,255,.12);}
    #srchWrap{position:absolute;right:36px;overflow:hidden;width:0;transition:width .28s cubic-bezier(.32,.72,0,1);display:flex;align-items:center;}
    #srchWrap.open{width:160px;}
    .srch input{width:100%;padding:8px 28px 8px 12px;border-radius:9px;border:none;background:#2C2C2E;color:#fff;font-size:15px;outline:none;font-family:inherit;flex-shrink:0;}
    .srch input::placeholder{color:#636366;}
    .srch-x{position:absolute;right:4px;color:#636366;display:none;cursor:pointer;padding:4px;width:24px;height:24px;}
    #srchIcon.has-query{background:var(--primary);animation:srchPulse 1.4s ease-in-out infinite;}
    @keyframes srchPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,122,255,.7);}50%{box-shadow:0 0 0 7px rgba(0,122,255,0);}}
    #netBanner{flex-shrink:0;display:none;padding:5px 12px;font-size:12px;font-weight:600;text-align:center;}
    #netBanner.offline{display:block;background:var(--orange);color:#fff;}
    #netBanner.pending{display:block;background:var(--orange);color:#fff;}
    #netBanner.syncing{display:block;background:var(--primary);color:#fff;}
    #listWrap{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 8px calc(var(--sab)+20px);-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;}
    #listWrap::-webkit-scrollbar{display:none;}
    .card{background:var(--card);border-radius:11px;margin-bottom:7px;display:flex;align-items:center;box-shadow:0 1px 2px rgba(0,0,0,0.06);user-select:none;-webkit-user-select:none;}
    .card.overdue-card{border-left:3px solid var(--red);border-radius:0 11px 11px 0;}
    .chk-area{padding:13px 9px 13px 13px;cursor:pointer;flex-shrink:0;}
    .checkbox{width:24px;height:24px;border:2px solid #C7C7CC;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s;}
    .checkbox.done{background:var(--primary);border-color:var(--primary);}
    .checkbox.done::after{content:'✓';color:#fff;font-size:13px;font-weight:800;}
    .info{flex:1;padding:12px 11px 12px 0;overflow:hidden;cursor:pointer;}
    .task-title{-webkit-text-size-adjust:none;text-size-adjust:none;font-size:17px;font-weight:600;color:var(--label);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;display:block;width:100%;}
    .task-title.done{text-decoration:line-through;color:var(--gray);font-weight:400;}
    .task-meta{display:flex;align-items:center;gap:6px;margin-top:2px;}
    .meta-cat{-webkit-text-size-adjust:none;text-size-adjust:none;font-size:11px;font-weight:700;color:#fff;background:var(--gray);padding:2px 7px;border-radius:5px;flex-shrink:0;max-width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .meta-date{-webkit-text-size-adjust:none;text-size-adjust:none;font-size:12px;color:var(--gray);flex-shrink:0;}
    .meta-date.overdue{color:var(--red);font-weight:700;}
    .pri-badge{-webkit-text-size-adjust:none;text-size-adjust:none;margin-left:auto;flex-shrink:0;background:#EBEBEB;color:#636366;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:700;opacity:0.85;}
    .task-note{-webkit-text-size-adjust:none;text-size-adjust:none;font-size:12px;color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;width:100%;}
    .empty-state{text-align:center;color:var(--gray);padding:50px 20px;font-size:15px;line-height:2;}
    .empty-state .emo{display:flex;justify-content:center;margin-bottom:12px;}
    #quickM{display:none;position:fixed;z-index:200;background:var(--card);border-radius:14px;padding:14px;box-shadow:0 8px 32px rgba(0,0,0,.28);width:calc(100vw - 32px);animation:fadeScaleIn .18s cubic-bezier(.32,.72,0,1);}
    #quickM.open{display:block;}
    @keyframes fadeScaleIn{from{opacity:0;transform:scale(0.92) translateY(-8px);}to{opacity:1;transform:scale(1) translateY(0);}}
    .quick-row{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
    .quick-row:last-child{margin-bottom:0;}
    #quickInput{flex:1;padding:12px 14px;border:none;border-radius:10px;background:var(--bg);font-size:18px;font-family:inherit;color:var(--label);outline:none;-webkit-appearance:none;width:100%;}
    #quickInput::placeholder{color:#AEAEB2;}
    #quickCat{flex:1;padding:12px 12px;border:none;border-radius:10px;background:var(--bg);font-size:17px;font-family:inherit;color:var(--label);outline:none;-webkit-appearance:none;cursor:pointer;}
    #quickSave{padding:12px 20px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:700;font-family:inherit;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
    #quickSave:active{opacity:.85;}
    #quickOverlay{display:none;position:fixed;inset:0;z-index:199;}
    #quickOverlay.open{display:block;}
    #ctxOverlay{display:none;position:fixed;inset:0;z-index:490;background:rgba(0,0,0,.35);}
    #ctxOverlay.open{display:block;}
    #ctxMenu{display:none;position:fixed;z-index:500;background:var(--card);border-radius:16px;overflow:hidden;min-width:200px;box-shadow:0 8px 32px rgba(0,0,0,.28);transform:scale(0.92);opacity:0;transition:transform .18s cubic-bezier(.32,.72,0,1),opacity .18s;}
    #ctxMenu.open{display:block;}
    #ctxMenu.show{transform:scale(1);opacity:1;}
    .ctx-item{display:flex;align-items:center;gap:12px;padding:14px 18px;font-size:15px;font-weight:500;color:var(--label);border-bottom:.5px solid #E5E5EA;-webkit-tap-highlight-color:transparent;}
    .ctx-item:last-child{border-bottom:none;}
    .ctx-item:active{background:var(--bg);}
    /* 快速編輯浮窗 */
    #quickEditM{display:none;position:fixed;z-index:510;background:var(--card);border-radius:14px;padding:14px;box-shadow:0 8px 32px rgba(0,0,0,.28);width:calc(100vw - 32px);animation:fadeScaleIn .18s cubic-bezier(.32,.72,0,1);}
    #quickEditM.open{display:block;}
    #quickEditOverlay{display:none;position:fixed;inset:0;z-index:509;}
    #quickEditOverlay.open{display:block;}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.48);align-items:flex-end;z-index:100;}
    .modal.open{display:flex;}
    .sheet{background:var(--card);width:100%;border-radius:20px 20px 0 0;padding-bottom:calc(var(--sab) + 6px);display:flex;flex-direction:column;max-height:88dvh;animation:slideUp .3s cubic-bezier(.32,.72,0,1);position:relative;transition:transform .25s cubic-bezier(.32,.72,0,1);will-change:transform;}
    @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
    .sh-handle{width:36px;height:4px;border-radius:2px;background:#D1D1D6;margin:10px auto 6px;flex-shrink:0;cursor:grab;}
    .sh-handle:active{cursor:grabbing;}
    .sh-title{font-size:15px;font-weight:700;text-align:center;color:var(--label);padding:6px 16px 4px;flex-shrink:0;}
    .sh-body{flex:1;overflow-y:auto;padding:2px 12px 10px;-webkit-overflow-scrolling:touch;transition:max-height .25s cubic-bezier(.32,.72,0,1);touch-action:pan-y;}
    .sh-body::-webkit-scrollbar{display:none;}
    #catM .sheet,#syncM .sheet{max-height:72dvh;}
    #syncM .sh-body{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
    .f{width:100%;padding:9px 11px;border:none;border-radius:9px;background:var(--bg);font-size:15px;font-family:inherit;color:var(--label);margin-bottom:6px;outline:none;display:block;-webkit-appearance:none;appearance:none;}
    .f::placeholder{color:#AEAEB2;}
    textarea.f{resize:none;height:68px;line-height:1.5;margin-top:6px;}
    select.f{cursor:pointer;}
    .frow{display:flex;gap:6px;}
    .frow>div{flex:1;}
    .btn-p{background:var(--primary);color:#fff;border:none;font-weight:700;padding:11px;border-radius:11px;width:100%;font-size:15px;cursor:pointer;margin-top:3px;font-family:inherit;}
    .btn-p:active{opacity:.85;}
    .btn-ghost{background:none;border:none;color:var(--red);font-weight:600;font-size:14px;padding:9px;width:100%;cursor:pointer;font-family:inherit;}
    .cat-row{display:flex;align-items:center;padding:9px 2px;border-bottom:.5px solid #E5E5EA;gap:8px;user-select:none;}
    .cat-row:last-child{border-bottom:none;}
    .cat-name{flex:1;font-size:14px;font-weight:600;color:var(--label);}
    .cat-acts{display:flex;gap:8px;flex-shrink:0;align-items:center;}
    .cat-act{font-size:13px;font-weight:600;cursor:pointer;}
    .cat-color-dot{width:20px;height:20px;border-radius:50%;flex-shrink:0;cursor:pointer;border:2px solid transparent;transition:transform .15s;}
    .cat-color-dot:active{transform:scale(.88);}
    .color-picker-wrap{display:none;position:fixed;z-index:300;background:var(--card);border-radius:14px;padding:12px;box-shadow:0 8px 32px rgba(0,0,0,.18);flex-wrap:wrap;gap:8px;width:188px;}
    .color-picker-wrap.open{display:flex;}
    .cp-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s;flex-shrink:0;}
    .cp-swatch:active{transform:scale(.88);}
    .cp-swatch.selected{border-color:#1C1C1E;box-shadow:0 0 0 2px #fff,0 0 0 4px #1C1C1E;}
    .card.cat-colored{border-left:3px solid var(--cat-color,var(--gray));border-radius:0 11px 11px 0;}
    .card.overdue-card.cat-colored{border-left:3px solid var(--red);}
    .move-btn{width:30px;height:30px;border:none;border-radius:8px;background:#F2F2F7;color:var(--label);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
    .move-btn:active{background:#E5E5EA;}
    .move-btn:disabled{opacity:0.25;pointer-events:none;}
    .cat-add-row{display:flex;gap:8px;align-items:center;margin-top:8px;padding-top:8px;border-top:.5px solid #E5E5EA;}
    .cat-add-input{flex:1;padding:10px 12px;border:none;border-radius:10px;background:var(--bg);font-size:15px;font-family:inherit;color:var(--label);outline:none;-webkit-appearance:none;}
    .cat-add-input::placeholder{color:#AEAEB2;}
    .cat-add-btn{padding:10px 16px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
    .cat-add-btn:active{opacity:.85;}
    .sync-badge{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:9px;margin-bottom:5px;font-size:12px;font-weight:600;flex-shrink:0;}
    .sync-badge.online{background:#E8F8ED;color:#1A7A35;}
    .sync-badge.offline{background:#FFF3E0;color:#B85C00;}
    .sync-badge .ndot{display:inline-block;width:auto;height:auto;border-radius:0;background:none !important;margin-right:2px;}
    .qpill{font-size:11px;font-weight:600;text-align:center;padding:3px 10px;border-radius:7px;margin-bottom:5px;flex-shrink:0;}
    .qpill.ok{background:#E8F8ED;color:#1A7A35;}
    .qpill.pending{background:#FFF3E0;color:#B85C00;}
    #syncLog{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);border-radius:9px;padding:6px;min-height:40px;margin-bottom:7px;}
    #syncLog::-webkit-scrollbar{display:none;}
    .log-entry{display:flex;align-items:baseline;gap:6px;padding:4px 0;border-bottom:.5px solid #E5E5EA;font-size:12px;line-height:1.4;}
    .log-entry:last-child{border-bottom:none;}
    .log-time{color:var(--gray);font-size:11px;white-space:nowrap;flex-shrink:0;}
    .log-msg{flex:1;word-break:break-all;}
    .log-msg.info{color:var(--primary);}
    .log-msg.success{color:#1A7A35;}
    .log-msg.error{color:var(--red);}
    .log-msg.warn{color:var(--orange);}
    .log-empty{text-align:center;color:var(--gray);padding:16px 0;font-size:12px;}
    .btn-sync{background:var(--primary);color:#fff;border:none;font-weight:700;padding:11px;border-radius:11px;width:100%;font-size:15px;cursor:pointer;flex-shrink:0;font-family:inherit;}
    .sync-row{display:flex;gap:8px;align-items:center;flex-shrink:0;}
    .sync-row .btn-sync{width:auto;flex:1;}
    .btn-sound{width:46px;height:46px;flex-shrink:0;background:#2C2C2E;color:#fff;border:none;border-radius:11px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
    .btn-sound:active{opacity:.75;}
    .btn-sound.on{background:var(--primary);}
    .btn-sync:disabled{background:var(--gray);}
    .import-btn{background:#2C2C2E;color:#fff;border:none;font-weight:700;padding:11px;border-radius:11px;width:100%;font-size:15px;cursor:pointer;flex-shrink:0;font-family:inherit;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;}
    .import-btn:active{opacity:.8;}
    #importFileInput{display:none;}
    @media (hover:none) and (pointer:coarse){.import-btn{display:none !important;}.import-result{display:none !important;}}
    .import-result{font-size:12px;padding:8px 10px;border-radius:8px;margin-top:6px;display:none;line-height:1.6;}
    .import-result.ok{background:#E8F8ED;color:#1A7A35;}
    .import-result.err{background:#FFE5E5;color:#C0392B;}
    #importMapModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center;padding:20px;}
    #importMapModal.open{display:flex;}

function enqueue(action, payload, label) {
  if (action === 'updateTask' || action === 'toggleTask') {
    const idx = pendingQueue.findIndex(q => q.action === action && q.payload.id === payload.id);
    if (action === 'toggleTask' && idx > -1) { pendingQueue.splice(idx,1); pushLog(`合併抵消：${label}`,'warn'); saveLocal(); updateBanner(); return; }
    if (action === 'updateTask' && idx > -1) { pendingQueue[idx] = {action,payload,label,addedAt:Date.now()}; pushLog(`覆蓋佇列：${label}`,'warn'); saveLocal(); updateBanner(); return; }
  }
  pendingQueue.push({action, payload, label, addedAt: Date.now()});
  pushLog(`佇列：${label}`, 'warn'); saveLocal(); updateBanner();
}
async function flushQueue() {
  if (!pendingQueue.length) return true;
  if (!isOnline()) { pushLog('離線，佇列等待','warn'); return false; }
  pushLog(`重送 ${pendingQueue.length} 筆…`, 'info');
  const failed = [];
  for (const item of pendingQueue) {
    try {
      const res = await fetch(GAS_URL, {method:'POST', body: JSON.stringify({action: item.action, ...item.payload})});
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      pushLog(`✓ ${item.label}`, 'success');
    } catch(e) { pushLog(`✗ ${item.label}: ${e.message||'錯誤'}`, 'error'); failed.push(item); }
  }
  pendingQueue = failed; saveLocal(); updateBanner(); updateSyncMeta();
  if (failed.length) { pushLog(`${failed.length} 筆未成功`,'warn'); return false; }
  return true;
}
async function pullFromCloud(reason, attempt=1) {
  if (!isOnline()) { pushLog('離線略過拉取','warn'); return; }
  if (attempt === 1) pushLog(`拉取雲端… (${reason})`, 'info'); else pushLog(`重試第 ${attempt} 次…`, 'info');
  try {
    const fetchWithTimeout = (url, ms=12000) => { const ctrl = new AbortController(); const tid = setTimeout(() => ctrl.abort(), ms); return fetch(url, {signal: ctrl.signal}).finally(() => clearTimeout(tid)); };
    const [resT, resC] = await Promise.all([
      fetchWithTimeout(`${GAS_URL}?action=getTasks`).then(r => r.json()),
      fetchWithTimeout(`${GAS_URL}?action=getCategories`).then(r => r.json())
    ]);
    allT = Array.isArray(resT) ? resT : [];
    if (Array.isArray(resC)) {
      const filtered = resC.filter(c => c && (typeof c === 'string' ? c !== "Category Name" : c.name !== "Category Name"));
      const hasSortOrder = filtered.some(c => typeof c === 'object' && c.sortOrder !== undefined);
      if (hasSortOrder) { filtered.sort((a, b) => (a.sortOrder||0) - (b.sortOrder||0)); allC = filtered.map(c => typeof c === 'string' ? c : c.name); catOrder = [...allC]; }
      else { allC = filtered.map(c => typeof c === 'string' ? c : c.name); applyCatOrder(); }
      filtered.forEach(c => { if (typeof c === 'object' && c.color) catColors[c.name] = c.color; else if (typeof c === 'object' && c.color === '') delete catColors[c.name]; });
      saveCatColors();
    }
    saveLocal(); pushLog(`完成：${allT.length} 任務 / ${allC.length} 分類`, 'success'); render(); renderSidebar();
  } catch(e) {
    if (attempt < 3 && isOnline()) { pushLog(`拉取失敗，${attempt} 秒後重試…`, 'warn'); await new Promise(r => setTimeout(r, attempt * 1000)); return pullFromCloud(reason, attempt + 1); }
    pushLog(`拉取失敗：${e.message||'錯誤'}`, 'error');
  }
}
async function fullSync(reason) {
  if (isSyncRunning) return; isSyncRunning = true; updateBanner();
  if (isOnline()) { const b = document.getElementById('netBanner'); b.className = 'syncing'; b.textContent = '同步中…'; }
  try { if (await flushQueue()) await pullFromCloud(reason); } finally { isSyncRunning = false; updateBanner(); updateSyncMeta(); }
}
async function pushOp(action, payload, label) {
  if (!isOnline()) { enqueue(action, payload, label); return; }
  pushLog(`推送：${label}`, 'info');
  try {
    const res = await fetch(GAS_URL, {method:'POST', body: JSON.stringify({action, ...payload})});
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    pushLog(`✓ ${label}`, 'success');
  } catch(e) { pushLog(`✗ ${label}: ${e.message||'錯誤'}`, 'error'); enqueue(action, payload, label); }
  updateBanner(); updateSyncMeta();
}

  function onTouchMove(e) { if (!isDragging) return; const dy = e.touches[0].clientY - startY; if (dy < 0) return; sheet.style.transform = `translateY(${dy}px)`; }

function render() {
  const list = document.getElementById('list'); const today = getToday();
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let f = allT.filter(t => {
    const d = fmtD(t.DueDate);
    if (currentF === '已完成') return t.Status === 'Done';
    if (currentF === '今天') return t.Status !== 'Done' && d && d <= today;
    if (currentF === '全部') return t.Status !== 'Done' && (!_titleFilterDate || (fmtD(t.DueDate) && fmtD(t.DueDate) <= _titleFilterDate));
    return String(t.Category) === currentF && t.Status !== 'Done';
  });
  if (q) f = f.filter(t => String(t.Task||"").toLowerCase().includes(q));
  if (!f.length) {
    const emSvg = {
      今天: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="48" height="48" style="color:#34C759"><polyline points="20 6 9 17 4 12"/></svg>`,
      已完成: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="48" height="48" style="color:#FF9500"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
      全部: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="48" height="48" style="color:#8E8E93"><rect x="5" y="3" width="14" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="12" y2="17"/></svg>`,
      default: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="48" height="48" style="color:#8E8E93"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>`
    };
    const ms = {今天:'今日無待辦', 已完成:'還沒有已完成的任務', 全部:'目前沒有任何待辦'};
    list.innerHTML = `<div class="empty-state"><span class="emo">${emSvg[currentF]||emSvg.default}</span>${ms[currentF]||`「${currentF}」目前無任務`}</div>`;
    return;
  }
  // 預算日期字串，避免 sort 和渲染重複呼叫 fmtD
  let f2 = f.map(t => ({ t, d: fmtD(t.DueDate)||'' }));
  f2.sort((a, b) => {
    if (currentF === '已完成') return (b.t.mTime||0) - (a.t.mTime||0);
    const dA = a.d || '9999-12-31', dB = b.d || '9999-12-31';
    if (dA !== dB) return dA.localeCompare(dB);
    if ((a.t.Priority||99) !== (b.t.Priority||99)) return (a.t.Priority||99) - (b.t.Priority||99);
    return (b.t.mTime||0) - (a.t.mTime||0);
  });
  const showCat = currentF==='今天' || currentF==='全部' || currentF==='已完成';
  const weekDays = ['(日)','(一)','(二)','(三)','(四)','(五)','(六)'];
  const getWeekDay = s => { if (!s) return ''; const [y,m,d] = s.split('-').map(Number); return weekDays[new Date(y,m-1,d).getDay()]; };
  const fmtDoneTime = ts => {
    if (!ts) return '';
    const dt = new Date(Number(ts));
    const yyyy = dt.getFullYear();
    const mm = String(dt.getMonth()+1).padStart(2,'0');
    const dd = String(dt.getDate()).padStart(2,'0');
    const hh = String(dt.getHours()).padStart(2,'0');
    const mi = String(dt.getMinutes()).padStart(2,'0');
    const wk = weekDays[dt.getDay()];
    return `${wk} ${yyyy}-${mm}-${dd} ${hh}:${mi}`;
  };
  list.innerHTML = f2.map(({ t, d }) => {
    const io = d && d < today && t.Status !== 'Done';
    const catColor = getCatColor(t.Category||''); const hasColor = catColors[t.Category||''];
    const isDone = t.Status === 'Done';
    const doneTimeStr = isDone && t.mTime ? fmtDoneTime(t.mTime) : '';
    return `<div class="card ${io?'overdue-card':''} ${hasColor&&!io?'cat-colored':''}" style="${hasColor&&!io?`--cat-color:${catColor}`:''}">
      <div class="chk-area" onclick="toggleT('${t.ID}')"><div class="checkbox ${isDone?'done':''}"></div></div>
      <div class="info" onclick="ctxShowMenu(event,'${t.ID}')" ontouchstart="ctxLongStart(event,'${t.ID}')" ontouchmove="ctxLongMove()" ontouchend="ctxLongEnd()" onmousedown="ctxLongStart(event,'${t.ID}')" onmouseup="ctxLongEnd()" onmouseleave="ctxLongEnd()">
        <div class="task-title ${isDone?'done':''}">${t.Task||'未命名'}</div>
        ${t.Note && t.Note.trim() ? `<div class="task-note">${t.Note.trim().replace(/\n/g,' ')}</div>` : ''}
        <div class="task-meta">
          ${showCat ? `<span class="meta-cat" style="background:${catColor}">${t.Category||'未分類'}</span>` : ''}
          ${doneTimeStr ? `<span class="meta-date" style="color:var(--green)">${doneTimeStr}</span>` : (d ? `<span class="meta-date ${io?'overdue':''}">${getWeekDay(d)} ${d}</span>` : '')}
          <span class="pri-badge">P${t.Priority||99}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function save() {
  playSound('add');
  const rawId = document.getElementById('editId').value;
  const isNew = !rawId; const id = rawId || ('T'+Date.now()); const mTime = Date.now();
  const data = { task: document.getElementById('taskInput').value.trim(), dueDate: document.getElementById('dateInput').value, category: document.getElementById('catSelect').value, priority: parseInt(document.getElementById('priInput').value)||99, note: document.getElementById('noteInput').value, mTime, ID: id };
  if (!data.task) { document.getElementById('taskInput').focus(); return; }
  if (!isNew) {
    const orig = allT.find(x => String(x.ID) === String(id));
    if (orig) {
      const noChange = data.task===(orig.Task||'') && data.dueDate===(fmtD(orig.DueDate)||'') && data.category===(orig.Category||'') && data.priority===(orig.Priority||99) && data.note===(orig.Note||'');
      if (noChange) { closeM('taskM'); return; }
    }
  }
  const idx = allT.findIndex(x => String(x.ID) === String(id));
  if (idx > -1) allT[idx] = {...allT[idx], Task:data.task, DueDate:data.dueDate, Category:data.category, Priority:data.priority, Note:data.note, mTime};
  else allT.push({ID:id, Status:'Pending', Task:data.task, DueDate:data.dueDate, Category:data.category, Priority:data.priority, Note:data.note, mTime});

const ARRIVAL_KEY = 'arrivalHistory';
const ARRIVAL_MAX = 5;

function getArrivalHistory() {
  try { return JSON.parse(localStorage.getItem(ARRIVAL_KEY)) || []; } catch { return []; }
}
function saveArrivalHistory(list) {
  localStorage.setItem(ARRIVAL_KEY, JSON.stringify(list));
}

function toggleArrival() {
  if (_arrivalLpFired) { _arrivalLpFired = false; return; }
  playSound('tap');
  const btn = document.getElementById('arrivalBtn');
  if (btn.classList.contains('recorded')) {
    // 已記錄 → 確認後清除
    if (confirm('確定清除到場時間？')) {
      btn.textContent = '到場時間';
      btn.classList.remove('recorded');
    }
  } else {
    // 未記錄 → 記錄當下時間
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const timeStr = hh + ':' + mm;
    btn.textContent = timeStr;
    btn.classList.add('recorded');
    // 寫入歷史記錄
    const history = getArrivalHistory();
    const dateStr = now.getFullYear() + '/' +
      String(now.getMonth()+1).padStart(2,'0') + '/' +
      String(now.getDate()).padStart(2,'0');
    history.unshift({ time: timeStr, date: dateStr });
    if (history.length > ARRIVAL_MAX) history.splice(ARRIVAL_MAX);
    saveArrivalHistory(history);
  }
}

let _audioCtx = null;
function _getAudioCtx() { if (!_audioCtx) _audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return _audioCtx; }
document.addEventListener('visibilitychange', () => { if (document.visibilityState==='visible' && _audioCtx && _audioCtx.state==='suspended') _audioCtx.resume(); });

// 從其他 app 切回來時，若鍵盤已收起則重置 sh-body maxHeight
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {

        ? window.innerHeight - window.visualViewport.height : 0;

      }
    }, 500);

function playSound(type) {
  if (!_soundEnabled) return;
  try {
    const ctx = _getAudioCtx();
    if (ctx.state === 'suspended') { ctx.resume().then(() => playSound(type)); return; }
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    const now = ctx.currentTime;
    if (type==='tap')    { osc.frequency.setValueAtTime(880,now); osc.frequency.exponentialRampToValueAtTime(660,now+0.06); gain.gain.setValueAtTime(0.12,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.08); osc.start(now); osc.stop(now+0.08); }
    else if (type==='done')   { osc.frequency.setValueAtTime(660,now); osc.frequency.setValueAtTime(880,now+0.07); gain.gain.setValueAtTime(0.14,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.18); osc.start(now); osc.stop(now+0.18); }
    else if (type==='add')    { osc.frequency.setValueAtTime(740,now); osc.frequency.exponentialRampToValueAtTime(1000,now+0.1); gain.gain.setValueAtTime(0.12,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.12); osc.start(now); osc.stop(now+0.12); }
    else if (type==='delete') { osc.frequency.setValueAtTime(440,now); osc.frequency.exponentialRampToValueAtTime(220,now+0.12); gain.gain.setValueAtTime(0.12,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.14); osc.start(now); osc.stop(now+0.14); }
    else if (type==='close')  { osc.type='sine'; osc.frequency.setValueAtTime(500,now); osc.frequency.exponentialRampToValueAtTime(280,now+0.1); gain.gain.setValueAtTime(0.08,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.12); osc.start(now); osc.stop(now+0.12); return; }
    else if (type==='select') { osc.type='sine'; osc.frequency.setValueAtTime(520,now); osc.frequency.exponentialRampToValueAtTime(440,now+0.07); gain.gain.setValueAtTime(0.09,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.09); osc.start(now); osc.stop(now+0.09); return; }
    else if (type==='swipe')  { osc.type='sine'; osc.frequency.setValueAtTime(300,now); osc.frequency.exponentialRampToValueAtTime(700,now+0.08); gain.gain.setValueAtTime(0.07,now); gain.gain.setValueAtTime(0.07,now+0.04); gain.gain.exponentialRampToValueAtTime(0.001,now+0.1); osc.start(now); osc.stop(now+0.1); return; }
    osc.type = 'sine';
  } catch(e) {}
}

  const t=allT.find(x=>String(x.ID)===String(id)); if(!t) return;

  document.getElementById('dateInput').value=fmtD(t.DueDate);
  const sel=document.getElementById('catSelect'); sel.innerHTML=allC.map(c=>`<option value="${c}">${c}</option>`).join(''); sel.value=t.Category||"";
  document.getElementById('priInput').value=t.Priority||99; document.getElementById('noteInput').value=t.Note||"";
  document.getElementById('delBtn').style.display='block'; document.getElementById('taskSheetTitle').textContent="檢視任務";
  document.getElementById('viewMode').style.display='block'; document.getElementById('editMode').style.display='none';
  const weekDays=['(日)','(一)','(二)','(三)','(四)','(五)','(六)'];
  const d=fmtD(t.DueDate); const wday=d?weekDays[new Date(...d.split('-').map((v,i)=>i===1?Number(v)-1:Number(v))).getDay()]:'';
  document.getElementById('viewTitle').textContent=t.Task||'未命名';
  document.getElementById('viewMeta').innerHTML=`<span>📁 ${t.Category||'未分類'}</span>${d?`<span>📅 ${wday} ${d}</span>`:''}<span>🔢 P${t.Priority||99}</span>`;
  const noteEl=document.getElementById('viewNote');
  if (t.Note && t.Note.trim()) { noteEl.textContent=t.Note; noteEl.style.display='block'; } else noteEl.style.display='none';
  openModal('taskM');
}
function switchToEdit() {
  playSound('tap'); document.getElementById('taskSheetTitle').textContent="編輯任務";
  document.getElementById('viewMode').style.display='none'; document.getElementById('editMode').style.display='block';
  setTimeout(()=>document.getElementById('taskInput').focus(),100);
}

// ── Excel / CSV 批次匯入 ─────────────────────────────────────
let _importRows=[], _importHeaders=[];
async function handleImport(event) {
  const file=event.target.files[0]; if(!file) return; event.target.value='';
  const resultEl=document.getElementById('importResult');
  resultEl.style.display='block'; resultEl.className='import-result'; resultEl.textContent='解析檔案中…';
  try {
    let rows=[];
    if (file.name.endsWith('.csv')) rows=await parseCsv(file); else rows=await parseXlsx(file);
    if (!rows.length||!rows[0].length) { resultEl.className='import-result err'; resultEl.textContent='檔案內容為空，請確認格式正確。'; return; }
    _importRows=rows; _importHeaders=rows[0].map(h=>String(h).trim());
    const selects=['mapTask','mapCategory','mapDueDate','mapPriority','mapNote'];
    const autoMap={ mapTask:['task','任務','任務名稱','title','名稱','主旨','subject'], mapCategory:['category','分類','cat'], mapDueDate:['duedate','due date','due','截止日期','日期','date','期限','deadline','結束日期'], mapPriority:['priority','優先級','優先','pri'], mapNote:['note','備註','notes','描述'] };
    selects.forEach(id=>{
      const sel=document.getElementById(id);
      sel.innerHTML='<option value="-1">— 不匯入 —</option>'+_importHeaders.map((h,i)=>`<option value="${i}">${h}</option>`).join('');
      const autoIdx=_importHeaders.findIndex(h=>autoMap[id].some(k=>h.toLowerCase().replace(/\s/g,'')=== k.replace(/\s/g,'')));
      sel.value=autoIdx>=0?autoIdx:-1;
    });
    document.getElementById('importMapSub').textContent=`共 ${rows.length-1} 筆資料，請確認欄位對應後按「開始匯入」`;
    resultEl.style.display='none'; document.getElementById('importMapModal').classList.add('open');
  } catch(e) { resultEl.className='import-result err'; resultEl.textContent='解析失敗：'+(e.message||'未知錯誤'); }
}
function closeImportMap() { document.getElementById('importMapModal').classList.remove('open'); _importRows=[]; _importHeaders=[]; }
function confirmImport() {
  const idxTask=parseInt(document.getElementById('mapTask').value);
  const idxCategory=parseInt(document.getElementById('mapCategory').value);
  const idxDueDate=parseInt(document.getElementById('mapDueDate').value);
  const idxPriority=parseInt(document.getElementById('mapPriority').value);
  const idxNote=parseInt(document.getElementById('mapNote').value);
  if (idxTask<0) { alert('請選擇「任務名稱」對應的欄位'); return; }
  const resultEl=document.getElementById('importResult');
  const dataRows=_importRows.slice(1).filter(r=>r.some(c=>String(c).trim()));
  const mTimeBase=Date.now(); let added=0,skipped=0,errors=0;
  for (let i=0;i<dataRows.length;i++) {
    const row=dataRows[i]; const task=String(row[idxTask]??'').trim(); if(!task){errors++;continue;}
    const category=idxCategory>=0?String(row[idxCategory]??'').trim():'';
    const dueDate=idxDueDate>=0?formatImportDate(row[idxDueDate]):'';
    const priority=idxPriority>=0?(parseInt(row[idxPriority])||99):99;
    const note=idxNote>=0?String(row[idxNote]??'').trim():'';
    const isDuplicate=allT.some(t=>String(t.Task||'').trim()===task&&String(t.Category||'').trim()===category);
    if (isDuplicate){skipped++;continue;}
    const id='T'+(mTimeBase+i); const mTime=mTimeBase+i;
    allT.push({ID:id,Task:task,Category:category,DueDate:dueDate,Status:'Pending',Priority:priority,Note:note,mTime});
    enqueue('addTask',{id,data:{task,category,dueDate,priority,note,mTime,ID:id}},`匯入「${task}」`);
    added++;
  }
  saveLocal(); render(); renderSidebar(); closeImportMap();
  resultEl.style.display='block'; resultEl.className='import-result ok';
  let msg=`匯入完成：新增 ${added} 筆`;
  if (skipped>0) msg+=`，跳過重複 ${skipped} 筆`;
  if (errors>0)  msg+=`，略過空白列 ${errors} 筆`;
  resultEl.textContent=msg+'。下次同步時會推送至雲端。';
  pushLog(`批次匯入 ${added} 筆任務，加入佇列待同步`,'info');
}
function formatImportDate(val) {
  if(!val) return '';
  const s=String(val).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  if (/^\d{5}$/.test(s)) { const d=new Date(Date.UTC(1899,11,30)+parseInt(s)*86400000); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  const d=new Date(s); if (!isNaN(d.getTime())) return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  return '';
}
function parseCsv(file) {
  return new Promise((resolve,reject)=>{
    const tryParse=(text)=>{ const rows=[]; let cur=[],field='',inQ=false; for(let i=0;i<text.length;i++){const c=text[i];if(inQ){if(c==='"'&&text[i+1]==='"'){field+='"';i++;}else if(c==='"')inQ=false;else field+=c;}else{if(c==='"')inQ=true;else if(c===','){cur.push(field);field='';}else if(c==='\n'||(c==='\r'&&text[i+1]==='\n')){if(c==='\r')i++;cur.push(field);rows.push(cur);cur=[];field='';}else field+=c;}}if(field||cur.length){cur.push(field);if(cur.some(f=>f))rows.push(cur);}return rows;};
    const isLikelyBig5=(buf)=>{ const bytes=new Uint8Array(buf.slice(0,512)); for(let i=0;i<bytes.length-1;i++){const b=bytes[i];if(b>=0x81&&b<=0xFE){const b2=bytes[i+1];if((b2>=0x40&&b2<=0x7E)||(b2>=0xA1&&b2<=0xFE))return true;}}return false;};
    const abReader=new FileReader();
    abReader.onload=e=>{ const buf=e.target.result; const encoding=isLikelyBig5(buf)?'Big5':'UTF-8'; const textReader=new FileReader(); textReader.onload=e2=>{try{resolve(tryParse(e2.target.result));}catch(err){reject(err);}};textReader.onerror=()=>reject(new Error('CSV 讀取失敗'));textReader.readAsText(file,encoding);};
    abReader.onerror=()=>reject(new Error('CSV 讀取失敗'));abReader.readAsArrayBuffer(file);
  });
}
function parseXlsx(file) {
  return new Promise((resolve,reject)=>{ if(window.XLSX){readXlsx(file,resolve,reject);return;} const script=document.createElement('script'); script.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js'; script.onload=()=>readXlsx(file,resolve,reject); script.onerror=()=>reject(new Error('無法載入 XLSX 解析器，請確認網路連線')); document.head.appendChild(script); });
}
function readXlsx(file,resolve,reject) {
  const reader=new FileReader();
  reader.onload=e=>{ try{ const wb=XLSX.read(e.target.result,{type:'array',cellDates:false,codepage:950,raw:false}); const ws=wb.Sheets[wb.SheetNames[0]]; const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false}); resolve(rows); }catch(err){reject(err);}};
  reader.onerror=()=>reject(new Error('Excel 讀取失敗')); reader.readAsArrayBuffer(file);
}

async function autoCleanDone() {
  const cutoff=Date.now()-(6*30*24*60*60*1000);
  const toDelete=allT.filter(t=>t.Status==='Done'&&Number(t.mTime)>0&&Number(t.mTime)<cutoff);
  if(!toDelete.length) return;
  const deleteIds=new Set(toDelete.map(t=>String(t.ID)));
  allT=allT.filter(t=>!deleteIds.has(String(t.ID))); saveLocal();
  pushLog(`自動清理 ${toDelete.length} 筆逾期已完成任務`,'info');
  for(const t of toDelete) await pushOp('deleteTask',{id:t.ID},`清理「${t.Task}」`);
}

async function init() {
  loadLocal(); applyCatOrder(); render(); renderSidebar(); updateBanner(); applySide();
  if (pendingQueue.length>0) pushLog(`發現 ${pendingQueue.length} 筆離線操作待同步`,'warn');
  await fullSync('啟動');
  await autoCleanDone();
  render(); renderSidebar();
}

window.onload = () => {
  if (checkLogin()) { document.getElementById('loginScreen').classList.add('hidden'); init(); }
  else { setTimeout(()=>document.getElementById('loginPwd').focus(),100); }
};
