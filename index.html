<!DOCTYPE html>

<html lang="zh-TW">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="待辦TEST">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icon.png">
  <link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==">
  <link rel="manifest" href="manifest.json">
  <title>待辦事項 [測試版]</title>
  <style>
    :root {
      --primary:#007AFF; --red:#FF3B30; --green:#34C759;
      --orange:#FF9500; --gray:#8E8E93; --label:#1C1C1E;
      --bg:#F2F2F7; --card:#FFFFFF; --sep:#3A3A3C;
      --sat:env(safe-area-inset-top,59px);
      --sab:env(safe-area-inset-bottom,34px);
      --sidebar-bg:#1C1C1E;
      --cat-h:48px;
    }
    *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html{height:100%;overflow:hidden;}
    body{
      position:fixed;inset:0;
      display:flex;flex-direction:row;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
      -webkit-font-smoothing:antialiased;
      background:var(--sidebar-bg);
      overscroll-behavior:none;
    }
    /* === 測試版視覺標示 === */
    body::before{
      content:'';
      position:fixed;inset:0;
      border:3px solid #FF3B30;
      pointer-events:none;
      z-index:99998;
    }
    body::after{
      content:'⚠ 測試版 TEST';
      position:fixed;
      top:env(safe-area-inset-top,8px);right:8px;
      background:#FF3B30;color:#fff;
      padding:3px 10px;
      font-size:11px;font-weight:700;
      border-radius:0 0 8px 8px;
      letter-spacing:0.5px;
      z-index:99999;
      pointer-events:none;
      font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    }
    #sidebar{
      width:76px;flex-shrink:0;
      height:100dvh;box-sizing:border-box;
      background:var(--sidebar-bg);
      display:flex;flex-direction:column;
      align-items:flex-start;
      transition:width 0.26s cubic-bezier(.32,.72,0,1);
      overflow:hidden;
      overscroll-behavior:none;
      position:relative;z-index:700;
    }
    /* v500.13: 桌面版側邊欄拖曳調整寬度 / v500.14: 視覺強化 */
    #sidebarResizer{
      position:absolute;top:0;right:0;width:6px;height:100%;
      background:rgba(255,255,255,0.14);
      cursor:col-resize;
      z-index:701;
      transition:background 0.15s ease;
      touch-action:none;
      display:flex;align-items:center;justify-content:center;
    }
    #sidebarResizer::before{
      content:'';
      width:2px;height:24px;
      background:rgba(255,255,255,0.45);
      border-radius:2px;
      box-shadow:4px 0 0 rgba(255,255,255,0.45), -4px 0 0 rgba(255,255,255,0.45);
      transition:background 0.15s ease, box-shadow 0.15s ease;
    }
    #sidebarResizer:hover, #sidebarResizer.dragging{background:var(--primary);}
    #sidebarResizer:hover::before, #sidebarResizer.dragging::before{
      background:#fff;
      box-shadow:4px 0 0 #fff, -4px 0 0 #fff;
    }
    #sidebar.resizing{transition:none;}  /* 拖曳中關閉寬度動畫 */
    /* 手機隱藏 resizer */
    @media (hover:none) and (pointer:coarse){
      #sidebarResizer{display:none;}
    }
    #fab {
      flex-shrink:0;
      width:46px;height:46px;border-radius:50%;
      margin-top:calc(var(--sat) + 6px);
      margin-bottom:6px;
      margin-left:15px;
      background:var(--primary);border:none;
      display:flex;align-items:center;justify-content:center;
      color:#fff;box-shadow:0 4px 14px rgba(0,122,255,.42);
      cursor:pointer;transition:transform .1s;
      -webkit-tap-highlight-color:transparent;
    }
    #fab:active{transform:scale(.9);}
    #fab.syncing { animation: fabSpin 1s linear infinite; }
    #fab.offline { opacity: 0.6; }
    @keyframes fabSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes badgePulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.2)} }
    #fabBadge{
      display:none;position:absolute;top:-4px;right:-4px;
      background:#FF3B30;color:#fff;
      font-size:10px;font-weight:700;
      min-width:16px;height:16px;border-radius:8px;
      align-items:center;justify-content:center;
      padding:0 4px;box-sizing:border-box;
      pointer-events:none;
    }
    #fabBadge.show{display:flex;}
    #sideList{
      flex:1;
      overflow-y:scroll;overflow-x:hidden;
      -webkit-overflow-scrolling:touch;
      width:100%;
      padding:2px 0 8px;
      overscroll-behavior-y:contain;
    }
    #sideList::-webkit-scrollbar{display:none;}
    .scat {
      position: relative;height: var(--cat-h);
      display: flex;align-items: center;
      justify-content: flex-start !important;
      padding: 0 0 0 14px !important;
      margin: 2px 4px;border-radius: 10px;
      cursor: pointer;overflow: hidden;
      user-select: none;-webkit-user-select: none;
      touch-action: manipulation;
    }
    .scat.active{background:var(--primary);}
    .scat:active{opacity:0.72;}
    .scat-abbr {
      display: block;font-size: 17px;font-weight: 600;
      color: rgba(255,255,255,0.9);white-space: nowrap;
      text-align: left !important;pointer-events: none;
      max-width: 52px;overflow: hidden;text-overflow: ellipsis;
    }
    .scat-label {
      display: none;flex: 1;font-size: 17px;font-weight: 600;
      color: rgba(255,255,255,0.9);white-space: nowrap;
      overflow: hidden;text-overflow: ellipsis;pointer-events: none;
    }
    .scat-count{display:none;font-size:12px;font-weight:500;color:rgba(255,255,255,0.5);margin-left:auto;margin-right:8px;flex-shrink:0;}
    .scat-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;pointer-events:none;}
    .scat-icon.today{background:#FF3B30;}
    .scat-icon.all{background:#007AFF;}
    .scat-icon.done{background:#34C759;}
    .scat-sys .scat-abbr{display:none;}
    .scat-sys .scat-label{display:none;}
    #sidebar.wide .scat-sys .scat-label{display:block;}
    .scat.active .scat-abbr,.scat.active .scat-label{color:#fff;font-weight:800;}
    .scat.active .scat-count{color:rgba(255,255,255,0.75);}
    #sidebar.wide .scat-count{display:block !important;}
    #sidebar.wide .scat-dot{display:none !important;}
    #sidebar.wide .scat-abbr{display:none;}
    #sidebar.wide .scat-label{display:block;}
    .scat-dot{
      position:absolute;top:8px;left:6px;
      width:7px;height:7px;border-radius:50%;
      background:var(--red);display:none;z-index:5;
      box-shadow:0 0 0 2px var(--sidebar-bg);
    }
    .scat-dot.show{display:block;}
    #sideFoot {
      flex-shrink:0;width:100%;
      display:none;flex-direction:column;
      align-items:flex-start;
      gap:8px;padding:6px 0 calc(6px + var(--sab)) 14px;
      background:var(--sidebar-bg);border-top:0.5px solid var(--sep);
      overflow:hidden;
    }
    #sidebar.wide #sideFoot { display:flex; }
    /* v500.14: 桌面版 Tab/拖曳提示（手機隱藏） */
    #sideHint{
      display:none;
      align-items:center;gap:4px;
      margin-top:4px;padding-top:6px;
      font-size:10px;color:rgba(255,255,255,0.42);
      letter-spacing:0.3px;line-height:1;
      border-top:0.5px solid rgba(255,255,255,0.06);
      width:calc(100% - 14px);
    }
    #sideHint .hint-key{
      font-size:9px;font-weight:600;
      padding:2px 5px;
      background:rgba(255,255,255,0.1);
      border-radius:3px;
      color:rgba(255,255,255,0.6);
    }
    #sideHint .hint-icon{font-size:11px;opacity:0.6;}
    #sideHint .hint-text{font-size:10px;}
    /* 桌面（精準指標）才顯示 */
    @media (hover:hover) and (pointer:fine){
      #sidebar.wide #sideHint{display:flex;}
    }
    .sbtn{
      margin-left:0 !important;width:44px;height:44px;
      border-radius:12px;background:#2C2C2E;border:none;
      display:flex;align-items:center;justify-content:center;color:#FFFFFF;
    }
    .sbtn:active{opacity:0.65;}
    .sbtn svg{width:20px;height:20px;color:#fff;display:block;stroke:currentColor;}
    #main{flex:1;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;border-radius:16px 16px 0 0;min-width:0;overscroll-behavior:none;}
    #mainHeader{
      flex-shrink:0;background:var(--label);border-radius:16px 16px 0 0;
      padding:calc(var(--sat) + 10px) 16px 10px 16px;
      display:flex;align-items:center;gap:10px;
    }
    #vTitle{font-size:22px;font-weight:800;color:#fff;flex:1;margin:0;letter-spacing:-0.3px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    
    #allFilterMenu{display:none;position:fixed;z-index:600;background:var(--card);border-radius:14px;box-shadow:0 8px 28px rgba(0,0,0,.28);min-width:200px;overflow:visible;}
    #allFilterMenu.open{display:block;}
    .afm-item{display:flex;align-items:center;padding:13px 16px;font-size:15px;font-weight:500;color:var(--label);border-bottom:.5px solid #E5E5EA;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
    .afm-item:last-child{border-bottom:none;}
    .afm-item:active{background:var(--bg);}
    .afm-date{display:flex;align-items:center;padding:8px 16px;border-bottom:.5px solid #E5E5EA;position:relative;}
    .afm-date:last-child{border-bottom:none;}
    .afm-date input[type=date]{flex:1;border:none;border-bottom:2px solid var(--primary);background:transparent;color:var(--label);font-size:15px;font-weight:500;font-family:inherit;outline:none;padding:4px 0;}
    #arrivalBtn{
      flex-shrink:0;padding:6px 14px;background:rgba(255,255,255,0.15);
      border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;
      font-family:inherit;cursor:pointer;letter-spacing:0.3px;
      -webkit-tap-highlight-color:transparent;transition:background .15s;white-space:nowrap;
      user-select:none;-webkit-user-select:none;
    }
    #arrivalBtn:active{background:rgba(255,255,255,0.28);}
    #arrivalBtn.recorded{background:var(--primary);}
    /* 到場記錄下拉 */
    #arrivalDrop{
      display:none;position:fixed;z-index:300;
      background:var(--card);border-radius:12px;
      box-shadow:0 8px 28px rgba(0,0,0,.22);
      min-width:160px;overflow:hidden;
      animation:fadeScaleIn .16s cubic-bezier(.32,.72,0,1);
    }
    #arrivalDrop.open{display:block;}
    .arrival-drop-title{font-size:11px;font-weight:700;color:var(--gray);padding:10px 14px 4px;letter-spacing:0.5px;}
    .arrival-drop-item{padding:10px 14px;font-size:15px;font-weight:500;color:var(--label);border-top:.5px solid #E5E5EA;}
    .arrival-drop-empty{padding:10px 14px;font-size:14px;color:var(--gray);}
    .srch{position:relative;display:flex;align-items:center;justify-content:flex-end;flex-shrink:0;}
    #srchIcon{
      width:36px;height:36px;border-radius:50%;background:transparent;border:none;
      color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:background .15s;flex-shrink:0;position:relative;z-index:1;
      -webkit-tap-highlight-color:transparent;
    }
    #srchIcon:active{background:rgba(255,255,255,.12);}
    #srchWrap{position:absolute;right:36px;overflow:hidden;width:0;transition:width .28s cubic-bezier(.32,.72,0,1);display:flex;align-items:center;}
    #srchWrap.open{width:160px;}
    .srch input{width:100%;padding:8px 28px 8px 12px;border-radius:9px;border:none;background:#2C2C2E;color:#fff;font-size:15px;outline:none;font-family:inherit;flex-shrink:0;}
    .srch input::placeholder{color:#636366;}
    .srch-x{position:absolute;right:4px;color:#636366;display:none;cursor:pointer;padding:4px;width:24px;height:24px;}
    #srchIcon.has-query{background:var(--primary);animation:srchPulse 1.4s ease-in-out infinite;}
    @keyframes srchPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,122,255,.7);}50%{box-shadow:0 0 0 7px rgba(0,122,255,0);}}
    
    #listWrap{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 8px calc(var(--sab)+20px);-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;}
    #importProgress{
      display:none;flex-shrink:0;
      padding:8px 12px;margin:0;
      background:var(--card);border-bottom:.5px solid var(--sep);
    }
    #importProgress.show{display:block;}
    .ip-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
    .ip-label{font-size:13px;font-weight:600;color:var(--label);}
    .ip-count{font-size:12px;color:var(--gray);}
    .ip-bar-wrap{height:6px;background:var(--sep);border-radius:3px;overflow:hidden;}
    .ip-bar{height:100%;border-radius:3px;transition:width .3s ease;width:0%;}
    .ip-bar.running{background:var(--primary);}
    .ip-bar.retrying{background:var(--orange);}
    .ip-bar.done{background:#34C759;}
    .ip-bar.failed{background:var(--red);}
    .ip-status{font-size:11px;color:var(--gray);margin-top:4px;text-align:right;}
    .ip-error-row{display:none;justify-content:space-between;align-items:center;margin-top:6px;}
    .ip-error-row.show{display:flex;}
    .ip-error-msg{font-size:12px;color:var(--red);font-weight:600;}
    .ip-retry-btn{font-size:12px;font-weight:700;color:#fff;background:var(--primary);border:none;border-radius:8px;padding:5px 12px;cursor:pointer;white-space:nowrap;}
    #listWrap::-webkit-scrollbar{display:none;}
    .card{
      background:var(--card);border-radius:11px;margin-bottom:7px;
      display:flex;align-items:center;
      box-shadow:0 1px 2px rgba(0,0,0,0.06);
      user-select:none;-webkit-user-select:none;
      touch-action:manipulation;
      content-visibility:auto;
      contain-intrinsic-size:auto 78px;
    }
    .card:has(.task-note){contain-intrinsic-size:auto 95px;}
    .card.overdue-card{border-left:3px solid var(--red);border-radius:0 11px 11px 0;}
    .chk-area{padding:13px 9px 13px 13px;cursor:pointer;flex-shrink:0;touch-action:manipulation;}
    .checkbox{width:24px;height:24px;border:2px solid #C7C7CC;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s;touch-action:manipulation;}
    .checkbox.done{background:var(--primary);border-color:var(--primary);}
    .checkbox.done::after{content:'✓';color:#fff;font-size:13px;font-weight:800;}
    .info{flex:1;padding:12px 11px 12px 0;overflow:hidden;cursor:pointer;touch-action:manipulation;}
    .task-title{-webkit-text-size-adjust:none;text-size-adjust:none;font-size:17px;font-weight:600;color:var(--label);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;display:block;width:100%;}
    .task-title.done{text-decoration:line-through;color:var(--gray);font-weight:400;}
    .card.empty-task-card{background:#FFF8E7;border-left:3px solid var(--red);}
    .task-meta{display:flex;align-items:center;gap:6px;margin-top:2px;}
    .meta-cat{-webkit-text-size-adjust:none;text-size-adjust:none;font-size:11px;font-weight:700;color:#fff;background:var(--gray);padding:2px 7px;border-radius:5px;flex-shrink:0;max-width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .meta-date{-webkit-text-size-adjust:none;text-size-adjust:none;font-size:12px;color:var(--gray);flex-shrink:0;}
    .meta-date.overdue{color:var(--red);font-weight:700;}
    .pri-badge{-webkit-text-size-adjust:none;text-size-adjust:none;margin-left:auto;flex-shrink:0;background:#EBEBEB;color:#636366;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:700;opacity:0.85;}
    .task-note{-webkit-text-size-adjust:none;text-size-adjust:none;font-size:12px;color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;width:100%;}
    .empty-state{text-align:center;color:var(--gray);padding:50px 20px;font-size:15px;line-height:2;}
    .empty-state .emo{display:flex;justify-content:center;margin-bottom:12px;}
    #quickM{display:none;position:fixed;z-index:820;background:var(--card);border-radius:14px;padding:14px;box-shadow:0 8px 32px rgba(0,0,0,.28);width:calc(100vw - 32px);animation:fadeScaleIn .18s cubic-bezier(.32,.72,0,1);}
    #quickM.open{display:block;}
    @keyframes fadeScaleIn{from{opacity:0;transform:scale(0.92) translateY(-8px);}to{opacity:1;transform:scale(1) translateY(0);}}
    .quick-row{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
    .quick-row:last-child{margin-bottom:0;}
    #quickInput{flex:1;padding:12px 14px;border:none;border-radius:10px;background:var(--bg);font-size:18px;font-family:inherit;color:var(--label);outline:none;-webkit-appearance:none;width:100%;}
    #quickInput::placeholder{color:#AEAEB2;}
    #quickCat{flex:1;padding:12px 12px;border:none;border-radius:10px;background:var(--bg);font-size:17px;font-family:inherit;color:var(--label);outline:none;-webkit-appearance:none;cursor:pointer;}
    #quickSave{padding:12px 20px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:700;font-family:inherit;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
    #quickSave:active{opacity:.85;}
    #quickOverlay{display:none;position:fixed;inset:0;z-index:819;background:rgba(0,0,0,.35);}
    #quickOverlay.open{display:block;}
    #ctxOverlay{display:none;position:fixed;inset:0;z-index:490;background:rgba(0,0,0,.35);}
    #ctxOverlay.open{display:block;}
    #ctxMenu{display:none;position:fixed;z-index:500;background:var(--card);border-radius:16px;overflow:hidden;min-width:200px;box-shadow:0 8px 32px rgba(0,0,0,.28);transform:scale(0.92);opacity:0;transition:transform .18s cubic-bezier(.32,.72,0,1),opacity .18s;}
    #ctxMenu.open{display:block;}
    #ctxMenu.show{transform:scale(1);opacity:1;}
    .ctx-item{display:flex;align-items:center;gap:12px;padding:14px 18px;font-size:15px;font-weight:500;color:var(--label);border-bottom:.5px solid #E5E5EA;-webkit-tap-highlight-color:transparent;}
    .ctx-item:last-child{border-bottom:none;}
    .ctx-item:active{background:var(--bg);}
    /* 快速編輯浮窗 */
    #quickEditM{display:none;position:fixed;z-index:810;background:var(--card);border-radius:14px;padding:14px;box-shadow:0 8px 32px rgba(0,0,0,.28);width:calc(100vw - 32px);animation:fadeScaleIn .18s cubic-bezier(.32,.72,0,1);}
    #quickEditM.open{display:block;}
    #quickEditOverlay{display:none;position:fixed;inset:0;z-index:809;background:rgba(0,0,0,.35);}
    #quickEditOverlay.open{display:block;}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.48);align-items:flex-end;z-index:800;}
    .modal.open{display:flex;}
    .sheet{background:var(--card);width:100%;border-radius:20px 20px 0 0;padding-bottom:calc(var(--sab) + 6px);display:flex;flex-direction:column;max-height:88dvh;animation:slideUp .3s cubic-bezier(.32,.72,0,1);position:relative;transition:transform .25s cubic-bezier(.32,.72,0,1);will-change:transform;}
    @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
    .sh-handle{width:36px;height:4px;border-radius:2px;background:#D1D1D6;margin:10px auto 6px;flex-shrink:0;cursor:grab;}
    .sh-handle:active{cursor:grabbing;}
    .sh-title{font-size:15px;font-weight:700;text-align:center;color:var(--label);padding:6px 16px 4px;flex-shrink:0;}
    .sh-body{flex:1;overflow-y:auto;padding:2px 12px 10px;-webkit-overflow-scrolling:touch;transition:max-height .25s cubic-bezier(.32,.72,0,1);touch-action:pan-y;}
    .sh-body::-webkit-scrollbar{display:none;}
    #catM .sheet,#syncM .sheet{max-height:72dvh;}
    #catM .sheet{padding-bottom:0;}
    #syncM .sh-body{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
    .f{width:100%;padding:9px 11px;border:none;border-radius:9px;background:var(--bg);font-size:15px;font-family:inherit;color:var(--label);margin-bottom:6px;outline:none;display:block;-webkit-appearance:none;appearance:none;}
    .f::placeholder{color:#AEAEB2;}
    textarea.f{resize:none;height:68px;line-height:1.5;margin-top:6px;}
    select.f{cursor:pointer;}
    .frow{display:flex;gap:6px;}
    .frow>div{flex:1;}
    .btn-p{background:var(--primary);color:#fff;border:none;font-weight:700;padding:11px;border-radius:11px;width:100%;font-size:15px;cursor:pointer;margin-top:3px;font-family:inherit;}
    .btn-p:active{opacity:.85;}
    .btn-ghost{background:none;border:none;color:var(--red);font-weight:600;font-size:14px;padding:9px;width:100%;cursor:pointer;font-family:inherit;}
    .cat-row{display:flex;align-items:center;padding:9px 2px;border-bottom:.5px solid #E5E5EA;gap:8px;user-select:none;}
    .cat-row:last-child{border-bottom:none;}
    .cat-name{flex:1;font-size:14px;font-weight:600;color:var(--label);}
    .cat-acts{display:flex;gap:8px;flex-shrink:0;align-items:center;}
    .cat-act{font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation;}
    .cat-color-dot{width:20px;height:20px;border-radius:50%;flex-shrink:0;cursor:pointer;border:2px solid transparent;transition:transform .15s;touch-action:manipulation;}
    .cat-color-dot:active{transform:scale(.88);}
    .color-picker-wrap{display:none;position:fixed;z-index:850;background:var(--card);border-radius:14px;padding:12px;box-shadow:0 8px 32px rgba(0,0,0,.18);flex-wrap:wrap;gap:8px;width:188px;}
    .color-picker-wrap.open{display:flex;}
    .cp-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s;flex-shrink:0;touch-action:manipulation;}
    .cp-swatch:active{transform:scale(.88);}
    .cp-swatch.selected{border-color:#1C1C1E;box-shadow:0 0 0 2px #fff,0 0 0 4px #1C1C1E;}
    .card.cat-colored{border-left:3px solid var(--cat-color,var(--gray));border-radius:0 11px 11px 0;}
    .card.overdue-card.cat-colored{border-left:3px solid var(--red);}
    .move-btn{width:30px;height:30px;border:none;border-radius:8px;background:#F2F2F7;color:var(--label);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
    .move-btn:active{background:#E5E5EA;}
    .move-btn:disabled{opacity:0.25;pointer-events:none;}
    .cat-add-row{display:flex;gap:8px;align-items:center;margin-top:8px;padding-top:8px;border-top:.5px solid #E5E5EA;}
    .cat-add-input{flex:1;padding:10px 12px;border:none;border-radius:10px;background:var(--bg);font-size:15px;font-family:inherit;color:var(--label);outline:none;-webkit-appearance:none;}
    .cat-add-input::placeholder{color:#AEAEB2;}
    .cat-add-btn{padding:10px 16px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
    .cat-add-btn:active{opacity:.85;}
    .sync-badge{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:9px;margin-bottom:5px;font-size:12px;font-weight:600;flex-shrink:0;}
    .sync-badge.online{background:#E8F8ED;color:#1A7A35;}
    .sync-badge.offline{background:#FFF3E0;color:#B85C00;}
    .sync-badge .ndot{display:inline-block;width:auto;height:auto;border-radius:0;background:none !important;margin-right:2px;}
    .qpill{font-size:11px;font-weight:600;text-align:center;padding:3px 10px;border-radius:7px;margin-bottom:5px;flex-shrink:0;}
    .qpill.ok{background:#E8F8ED;color:#1A7A35;}
    .qpill.pending{background:#FFF3E0;color:#B85C00;}
    #syncLog{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);border-radius:9px;padding:6px;min-height:40px;margin-bottom:7px;}
    #syncLog::-webkit-scrollbar{display:none;}
    .log-entry{display:flex;align-items:baseline;gap:6px;padding:4px 0;border-bottom:.5px solid #E5E5EA;font-size:12px;line-height:1.4;}
    .log-entry:last-child{border-bottom:none;}
    .log-time{color:var(--gray);font-size:11px;white-space:nowrap;flex-shrink:0;}
    .log-msg{flex:1;word-break:break-all;}
    .log-msg.info{color:var(--primary);}
    .log-msg.success{color:#1A7A35;}
    .log-msg.error{color:var(--red);}
    .log-msg.warn{color:var(--orange);}
    .log-empty{text-align:center;color:var(--gray);padding:16px 0;font-size:12px;}
    .btn-sync{background:var(--primary);color:#fff;border:none;font-weight:700;padding:11px;border-radius:11px;width:100%;font-size:15px;cursor:pointer;flex-shrink:0;font-family:inherit;}
    .sync-row{display:flex;gap:8px;align-items:center;flex-shrink:0;}
    .sync-row .btn-sync{width:auto;flex:1;}
    .btn-sound{width:46px;height:46px;flex-shrink:0;background:#2C2C2E;color:#fff;border:none;border-radius:11px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
    .btn-sound:active{opacity:.75;}
    .btn-sound.on{background:var(--primary);}
    .btn-sync:disabled{background:var(--gray);}
    .import-btn{background:#2C2C2E;color:#fff;border:none;font-weight:700;padding:11px;border-radius:11px;width:100%;font-size:15px;cursor:pointer;flex-shrink:0;font-family:inherit;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;}
    .import-btn:active{opacity:.8;}
    #importFileInput{display:none;}
    @media (hover:none) and (pointer:coarse){.import-btn{display:none !important;}.import-result{display:none !important;}}
    .import-result{font-size:12px;padding:8px 10px;border-radius:8px;margin-top:6px;display:none;line-height:1.6;}
    .import-result.ok{background:#E8F8ED;color:#1A7A35;}
    .import-result.err{background:#FFE5E5;color:#C0392B;}
    #importMapModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:810;align-items:center;justify-content:center;padding:20px;}
    #importMapModal.open{display:flex;}
    .import-map-sheet{background:var(--card);border-radius:16px;width:100%;max-width:420px;padding:20px;display:flex;flex-direction:column;gap:10px;max-height:90dvh;overflow-y:auto;}
    .import-map-title{font-size:16px;font-weight:700;color:var(--label);text-align:center;margin-bottom:4px;}
    .import-map-sub{font-size:12px;color:var(--gray);text-align:center;margin-bottom:6px;}
    .import-map-row{display:flex;align-items:center;gap:8px;}
    .import-map-label{font-size:13px;font-weight:600;color:var(--label);width:72px;flex-shrink:0;}
    .import-map-label span{font-size:10px;color:var(--red);}
    .import-map-select{flex:1;padding:8px 10px;border:none;border-radius:9px;background:var(--bg);font-size:14px;font-family:inherit;color:var(--label);outline:none;-webkit-appearance:none;cursor:pointer;}
    .import-map-btns{display:flex;gap:8px;margin-top:6px;}
    .import-map-btns button{flex:1;padding:11px;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
    .import-confirm-btn{background:var(--primary);color:#fff;}
    .import-cancel-btn{background:#E5E5EA;color:var(--label);}
    #loginScreen{
      position:fixed;inset:0;z-index:99999;
      background:var(--sidebar-bg);
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      padding:env(safe-area-inset-top, 20px) 28px env(safe-area-inset-bottom, 20px);
      overflow-y:auto;-webkit-overflow-scrolling:touch;
      touch-action:auto;
      -webkit-tap-highlight-color:rgba(0,0,0,0);
      isolation:isolate;
      pointer-events:auto;
    }
    #loginScreen.hidden{display:none;}
    /* 登入畫面顯示時，禁用所有非登入畫面的觸控 */
    body:has(#loginScreen:not(.hidden)) > *:not(#loginScreen){
      pointer-events:none !important;
    }
    .login-logo{margin-bottom:8px;margin-top:auto;}
    .login-title{font-size:22px;font-weight:800;color:#fff;margin-bottom:4px;letter-spacing:-0.3px;}
    .login-sub{font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:36px;}
    .login-box{width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px;margin-bottom:auto;touch-action:auto;}
    .login-input{width:100%;padding:15px 16px;background:#2C2C2E;border:1.5px solid transparent;border-radius:13px;color:#fff;font-size:16px;font-family:inherit;outline:none;transition:border-color .18s;touch-action:manipulation;-webkit-user-select:text;user-select:text;position:relative;z-index:1;pointer-events:auto;}
    .login-input:focus{border-color:var(--primary);}
    .login-input::placeholder{color:#636366;}
    .login-input.shake{animation:shake .35s cubic-bezier(.36,.07,.19,.97);border-color:var(--red);}
    @keyframes shake{10%,90%{transform:translateX(-3px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-5px)}40%,60%{transform:translateX(5px)}}
    .login-btn{width:100%;padding:15px;background:var(--primary);color:#fff;border:none;border-radius:13px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity .15s;touch-action:manipulation;}
    .login-btn:active{opacity:.82;}
    .login-btn:disabled{background:var(--gray);cursor:default;}
    .login-err{font-size:13px;color:var(--red);font-weight:600;text-align:center;min-height:18px;}
    .login-remember{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,0.55);font-size:13px;cursor:pointer;}
    .login-remember input{width:16px;height:16px;cursor:pointer;accent-color:var(--primary);}

    /* 同步健康檢查提醒橫幅 */
    #syncReminder{
      display:none;position:fixed;
      top:calc(var(--sat) + 8px);left:8px;right:8px;
      z-index:8000;
      background:#FFF3CD;color:#856404;
      border:1px solid #FFE08A;border-radius:12px;
      padding:10px 12px;
      box-shadow:0 4px 14px rgba(0,0,0,.18);
      align-items:center;gap:10px;
      font-size:13px;font-weight:600;
      animation:fadeScaleIn .2s cubic-bezier(.32,.72,0,1);
    }
    #syncReminder.show{display:flex;}
    #syncReminder.urgent{background:#F8D7DA;color:#721C24;border-color:#F5C6CB;}
    #syncReminder .sr-msg{flex:1;line-height:1.4;}
    #syncReminder .sr-btn{
      flex-shrink:0;padding:6px 12px;
      background:var(--primary);color:#fff;
      border:none;border-radius:8px;
      font-size:13px;font-weight:700;
      font-family:inherit;cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    #syncReminder .sr-btn.secondary{background:transparent;color:#856404;}
    #syncReminder.urgent .sr-btn.secondary{color:#721C24;}
    #syncReminder .sr-btn:disabled{opacity:0.5;cursor:default;}

  </style>
</head>
<body>

<!-- 同步健康檢查提醒（body 直接子元素，z-index 高於主畫面） -->
<div id="syncReminder">
  <span class="sr-msg">⚠️ 已 <span id="syncReminderDays"></span> 天未同步</span>
  <button class="sr-btn" onclick="doSyncFromReminder()">立即同步</button>
  <button class="sr-btn secondary" onclick="dismissSyncReminder()">稍後</button>
</div>

<!-- 登入畫面 -->

<div id="loginScreen">
  <div class="login-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="64" height="64">
      <rect x="5" y="3" width="14" height="18" rx="2"/>
      <path d="M9 3v2h6V3"/>
      <line x1="9" y1="9" x2="15" y2="9"/>
      <line x1="9" y1="13" x2="15" y2="13"/>
      <line x1="9" y1="17" x2="12" y2="17"/>
      <polyline points="7 9 8 10 9 8" stroke-width="1.8"/>
    </svg>
  </div>
  <div class="login-title">宜修的待辦清單</div>
  <div class="login-sub">請輸入密碼以繼續</div>
  <div class="login-box">
    <input type="password" id="loginPwd" class="login-input" placeholder="密碼" onkeydown="if(event.key==='Enter')doLogin()">
    <label class="login-remember">
      <input type="checkbox" id="loginRemember" checked>
      記住登入狀態（30天）
    </label>
    <div class="login-err" id="loginErr"></div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">登入</button>
  </div>
</div>

<div id="sidebar">
  <div id="sidebarResizer" onmousedown="sidebarResizeStart(event)" aria-hidden="true"></div>
  <button id="fab" onclick="fabClick()" ontouchstart="fabTouchStart()" ontouchend="fabTouchEnd()" ontouchmove="fabTouchMove()" onmousedown="fabTouchStart()" onmouseup="fabTouchEnd()" onmouseleave="fabTouchEnd()" aria-label="新增" style="position:relative;">
    <svg id="fabIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" width="26" height="26">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    <span id="fabBadge"></span>
  </button>
  <div id="sideList"></div>
  <div id="sideFoot">
    <button class="sbtn" onclick="openCatM()" aria-label="分類">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
        <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/>
        <circle cx="7" cy="7" r="1.5" fill="currentColor" stroke="none"/>
      </svg>
    </button>
    <button class="sbtn" onclick="openSyncLog()" aria-label="同步">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
        <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115-6.7L21 8"/>
        <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 01-15 6.7L3 16"/>
      </svg>
    </button>
    <!-- v500.14: 桌面版提示（Tab/拖曳調整寬度），手機隱藏 -->
    <div id="sideHint">
      <span class="hint-key">Tab</span>
      <span class="hint-icon">⇆</span>
      <span class="hint-text">拖曳</span>
    </div>
  </div>
</div>

<div id="main">
  <div id="mainHeader">
    <h1 id="vTitle" onclick="onVTitleClick()">今天</h1>
    <button id="arrivalBtn"
      onclick="toggleArrival()"
      ontouchstart="arrivalLpStart()"
      ontouchmove="arrivalLpMove()"
      ontouchend="arrivalLpEnd()"
      onmousedown="arrivalLpStart()"
      onmouseup="arrivalLpEnd()"
      onmouseleave="arrivalLpEnd()">到場時間</button>
    <div id="arrivalDrop"></div>
    <div class="srch">
      <div id="srchWrap">
        <input type="search" id="searchInput" placeholder="搜尋…" oninput="handleSearch()" autocomplete="off" autocorrect="off" spellcheck="false">
        <span id="srchX" class="srch-x" onclick="clearSearch()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="13" height="13">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </span>
      </div>
      <button id="srchIcon" onclick="toggleSearch()" aria-label="搜尋">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="19" height="19">
          <circle cx="10.5" cy="10.5" r="6.5"/><line x1="15.5" y1="15.5" x2="21" y2="21"/>
        </svg>
      </button>
    </div>
  </div>
  <div id="importProgress">
    <div class="ip-header">
      <span class="ip-label" id="ipLabel">匯入同步中</span>
      <span class="ip-count" id="ipCount"></span>
    </div>
    <div class="ip-bar-wrap"><div class="ip-bar running" id="ipBar"></div></div>
    <div class="ip-status" id="ipStatus"></div>
    <div class="ip-error-row" id="ipErrorRow">
      <span class="ip-error-msg" id="ipErrorMsg"></span>
      <button class="ip-retry-btn" onclick="ipManualRetry()">立即同步</button>
    </div>
  </div>
  <div id="listWrap"><div id="list">載入中…</div></div>
</div>

<!-- 快速新增 -->

<div id="quickOverlay" onclick="closeQuick()"></div>
<div id="quickM" onclick="event.stopPropagation()">
  <div class="quick-row">
    <input type="text" id="quickInput" placeholder="任務名稱…" onkeydown="if(event.key==='Enter'&&!event.isComposing)saveQuick()">
  </div>
  <div class="quick-row">
    <select id="quickCat"></select>
    <button id="quickSave" onclick="saveQuick()">新增</button>
  </div>
</div>

<!-- 任務視窗 -->

<div id="taskM" class="modal" onclick="if(event.target===this)closeM('taskM')">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sh-handle"></div>
    <div class="sh-title" id="taskSheetTitle">新增任務</div>
    <div class="sh-body">
      <input type="hidden" id="editId">
      <div id="viewMode" style="display:none">
        <div id="viewTitle" style="font-size:18px;font-weight:700;color:var(--label);margin-bottom:10px;line-height:1.4"></div>
        <div id="viewMeta" style="font-size:13px;color:var(--gray);margin-bottom:8px;display:flex;gap:10px;flex-wrap:wrap"></div>
        <div id="viewNote" style="font-size:14px;color:var(--gray);background:var(--bg);border-radius:9px;padding:10px 12px;min-height:40px;line-height:1.6;white-space:pre-wrap;display:none"></div>
        <button class="btn-p" style="margin-top:12px" onclick="switchToEdit()">編輯任務</button>
      </div>
      <div id="editMode" style="display:none">
        <input type="text" id="taskInput" class="f" placeholder="任務名稱">
        <div class="frow">
          <div style="flex:2"><input type="date" id="dateInput" class="f" style="margin-bottom:0"></div>
          <div style="flex:2"><select id="catSelect" class="f" style="margin-bottom:0"></select></div>
          <div style="flex:1"><input type="number" id="priInput" class="f" placeholder="P#" min="1" max="99" style="margin-bottom:0;text-align:center" oninput="this.value=this.value.replace(/[^0-9]/g,'');if(this.value.length>2)this.value=this.value.slice(0,2);if(this.value>99)this.value=99;if(this.value<1&&this.value!=='')this.value=1;"></div>
        </div>
        <textarea id="noteInput" class="f" placeholder="備註（選填）" style="margin-bottom:4px;height:96px"></textarea>
        <button class="btn-p" onclick="save()">儲存</button>
        <button class="btn-ghost" id="delBtn" onclick="delTask()">刪除此任務</button>
      </div>
    </div>
  </div>
</div>

<!-- 分類管理 -->

<div id="catM" class="modal" onclick="if(event.target===this)cancelCatM()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sh-handle"></div>
    <div class="sh-title">分類管理</div>
    <div class="sh-body">
      <div id="catList"></div>
    </div>
    <div style="padding:8px 12px calc(var(--sab) + 6px);border-top:.5px solid #E5E5EA;background:var(--card);flex-shrink:0;">
      <div class="cat-add-row" style="margin-top:0;padding-top:0;border-top:none;">
        <input type="text" id="newC" class="cat-add-input" placeholder="新增分類…" onkeydown="if(event.key==='Enter'&&!event.isComposing)addC()">
        <button class="cat-add-btn" onclick="addC()">新增</button>
      </div>
      <button class="btn-p" style="margin-top:8px;background:#636366;" onclick="closeCatM()">完成</button>
    </div>
  </div>
</div>

<!-- 同步記錄 -->

<div id="syncM" class="modal" onclick="if(event.target===this)closeM('syncM')">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sh-handle"></div>
    <div class="sh-title">同步記錄</div>
    <div class="sh-body">
      <div class="sync-badge" id="syncNetBadge">
        <span class="ndot" id="syncStatusTag"></span>
        <span id="syncNetTxt"></span>
      </div>
      <div class="qpill" id="queuePill"></div>
      <div id="lastSyncPill" style="font-size:12px;color:var(--gray);text-align:center;padding:4px 0;"></div>
      <div id="syncLog"><p class="log-empty">尚無同步記錄</p></div>
      <div class="sync-row">
        <button class="btn-sync" id="syncNowBtn" onclick="doSyncFromModal()">立即同步</button>
        <button class="btn-sound" id="soundBtn" onclick="toggleSound()" title="按鍵音效">🔇</button>
      </div>
      <button class="import-btn" onclick="document.getElementById('importFileInput').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        匯入 Excel / CSV
      </button>
      <input type="file" id="importFileInput" accept=".xlsx,.xls,.csv" onchange="handleImport(event)">
      <div class="import-result" id="importResult"></div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
        <button class="btn-sync" style="background:#3A3A3C;flex:1;" onclick="if(confirm('確定登出？'))doLogout()">登出</button>
        <span id="swVerBadge" style="font-size:11px;font-weight:600;color:#8E8E93;background:#2C2C2E;padding:6px 10px;border-radius:9px;white-space:nowrap;flex-shrink:0;">讀取中…</span>
      </div>
    </div>
  </div>
</div>

<!-- 匯入欄位對應 -->

<div id="importMapModal">
  <div class="import-map-sheet">
    <div class="import-map-title">欄位對應設定</div>
    <div class="import-map-sub" id="importMapSub">請選擇每個欄位對應 Excel 的哪一欄</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxIgZpbEbUMxyOgW9NcAwW6OAUHTaUCMGah5owuvkO3SrFtTIqPmCZCRkcZWGuWTXhr/exec";

const APP_VERSION = "TESTtodo-v500.14"; // 測試版（自動登入 + 視覺標示）
const TOKEN_TTL = 30 * 24 * 60 * 60 * 1000;

// ── 修正方案 v500 新增常數 ──
const RECENT_DONE_MONTHS = 6;        // 手機端 filter：只顯示近 6 個月內已完成任務
const SYNC_REMINDER_DAYS = 14;       // 14 天沒全量同步就顯示提醒
const SYNC_URGENT_DAYS = 30;         // 30 天升級為紅色警告

async function hashPassword(pwd) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pwd));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function getSession() {
  try {
    const stored = JSON.parse(localStorage.getItem('authToken') || 'null');
    if (!stored || !stored.token || Date.now() > stored.exp) {
      localStorage.removeItem('authToken'); return null;
    }
    return stored.token;
  } catch(e) { return null; }
}

function checkLogin() {
  return !!getSession();
}

async function doLogin() {
  const pwd = document.getElementById('loginPwd').value;
  const errEl = document.getElementById('loginErr');
  const remember = document.getElementById('loginRemember').checked;
  if (!pwd) { shakeInput(); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '驗證中…';
  try {
    const hash = await hashPassword(pwd);
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'login', hash })
    });
    const data = await res.json();
    if (data.status !== 'success') {
      if (data.message === 'settings not found') {
        errEl.textContent = '設定錯誤：請確認 Settings 工作表是否存在';
      } else {
        errEl.textContent = '密碼錯誤，請重試';
      }
      shakeInput();
      btn.disabled = false; btn.textContent = '登入'; return;
    }
    const ttl = remember ? TOKEN_TTL : (8 * 60 * 60 * 1000);
    const exp = Math.min(data.exp, Date.now() + ttl);
    localStorage.setItem('authToken', JSON.stringify({ token: data.token, exp }));
    playSound('add');
    document.getElementById('loginScreen').classList.add('hidden');
    errEl.textContent = '';
    init();
  } catch(e) {
    errEl.textContent = '連線失敗，請稍後再試'; shakeInput();
  }
  btn.disabled = false; btn.textContent = '登入';
}

function doLogout() { localStorage.removeItem('authToken'); location.reload(); }
function shakeInput() {
  const el = document.getElementById('loginPwd');
  el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake');
  el.addEventListener('animationend', () => el.classList.remove('shake'), { once: true });
}

let allT = [], allC = [], currentF = '今天';
let syncLogs = [], pendingQueue = [];
let isSyncRunning = false, sideState = 1;
let lastSyncTime = parseInt(localStorage.getItem('lastSyncTime') || '0');
let catOrder = [], lastUsedCat = '';
let _catPendingOps = []; // 分類管理暫存操作，按「完成」才推送

const genID = () => 'T' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);

const fmtD = s => s ? String(s).split('T')[0].replace(/\//g, '-') : "";
const getToday = () => { const n = new Date(); return n.getFullYear() + '-' + String(n.getMonth()+1).padStart(2,'0') + '-' + String(n.getDate()).padStart(2,'0'); };
const fmtTime = () => new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
const isOnline = () => navigator.onLine;

// pendingQueue 立即寫入（避免離線操作遺失）
const saveQueue = () => {
  localStorage.setItem('pendingQueue', JSON.stringify(pendingQueue));
};

// 任務/分類資料 debounce 寫入（避免連續操作阻塞）
let _saveTimer = null;
const saveLocal = () => {
  saveQueue(); // pendingQueue 永遠立即寫
  if (_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    localStorage.setItem('tasks', JSON.stringify(allT));
    localStorage.setItem('cats', JSON.stringify(allC));
    localStorage.setItem('catOrder', JSON.stringify(catOrder));
    if (lastUsedCat) localStorage.setItem('lastUsedCat', lastUsedCat);
  }, 300);
};
const loadLocal = () => {
  try { allT = JSON.parse(localStorage.getItem('tasks')) || []; } catch(e) { allT = []; }
  loadCatColors();
  try { const raw = JSON.parse(localStorage.getItem('cats')) || []; allC = raw.map(c => typeof c === 'string' ? {name:c, rowId:null, color:'', sortOrder:0} : c); } catch(e) { allC = []; }
  try { catOrder = JSON.parse(localStorage.getItem('catOrder')) || []; } catch(e) { catOrder = []; }
  lastUsedCat = localStorage.getItem('lastUsedCat') || '';
  try { pendingQueue = JSON.parse(localStorage.getItem('pendingQueue')) || []; } catch(e) { pendingQueue = []; }

  // ── 升級相容處理（v500 新增） ──
  let needSave = false;
  let inflightCount = 0;
  let convertedToggleCount = 0;
  let orphanToggleCount = 0;

  pendingQueue = pendingQueue.filter(item => {
    // 1. 補 _opId（舊版沒有此欄位）
    if (!item._opId) {
      item._opId = `op_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
      needSave = true;
    }
    // 2. 清除 inflight 標記（上次中斷的視為待推送）
    if (item.inflight) {
      inflightCount++;
      delete item.inflight;
      delete item.inflightAt;
      needSave = true;
    }
    // 3. 把舊 toggleTask 轉換為 setTaskStatus（冪等性升級）
    if (item.action === 'toggleTask') {
      const t = allT.find(x => String(x.ID) === String(item.payload.id));
      if (t) {
        item.action = 'setTaskStatus';
        item.payload.status = t.Status || 'Pending';
        item.payload.mTime = Date.now();
        item.label = (item.label || '').replace('toggleTask', 'setTaskStatus');
        convertedToggleCount++;
        needSave = true;
      } else {
        // 找不到對應任務 → 移除 orphan 操作
        orphanToggleCount++;
        needSave = true;
        return false;
      }
    }
    return true;
  });

  if (inflightCount > 0) {
    pushLog(`偵測到 ${inflightCount} 筆上次中斷的推送，將自動重試`, 'warn');
  }
  if (convertedToggleCount > 0) {
    pushLog(`升級：轉換 ${convertedToggleCount} 筆 toggle 操作為 setStatus`, 'info');
  }
  if (orphanToggleCount > 0) {
    pushLog(`升級：移除 ${orphanToggleCount} 筆找不到任務的舊操作`, 'warn');
  }
  if (needSave) saveLocal();
};

// ── 修正方案 v500 新增的輔助函式 ──

// filter 函式：判斷任務是否應該保留在本機 allT
function shouldKeep(t) {
  if (!t) return false;
  if (t.Status !== 'Done') return true;          // Pending 全收
  if (!t.mTime || Number(t.mTime) === 0) return true; // mTime 不明保險收下
  const cutoff = Date.now() - (RECENT_DONE_MONTHS * 30 * 24 * 60 * 60 * 1000);
  return Number(t.mTime) >= cutoff;
}

// 計算本週週二 04:00 的時間戳（以週二為週期切點）
function getTuesdayOfThisWeek(timestamp) {
  const d = new Date(timestamp);
  const day = d.getDay();  // 0=日, 1=一, 2=二, ...
  // 週日和週一算「上週還沒到本週週二」→ 用上週二
  // 週二~週六算「本週週二在過去或今天」→ 用本週二
  let daysFromTuesday;
  if (day === 0) daysFromTuesday = -5;        // 週日：上週二是 5 天前
  else if (day === 1) daysFromTuesday = -6;   // 週一：上週二是 6 天前
  else daysFromTuesday = 2 - day;             // 週二之後（含週二）：算到本週二
  const result = new Date(d);
  result.setDate(d.getDate() + daysFromTuesday);
  result.setHours(4, 0, 0, 0);
  return result.getTime();
}

// 判斷是否需要強制全量同步（每週二循環）
function needsWeeklyFullSync() {
  const lastFullSync = parseInt(localStorage.getItem('lastFullSync') || '0');
  const now = Date.now();

  // 防呆：未來時間
  if (lastFullSync > now) {
    localStorage.setItem('lastFullSync', '0');
    return true;
  }

  // 首次安裝
  if (lastFullSync === 0) return true;

  // 算出「本週週二 04:00」（以週二為週循環切點）
  const thisWeekTuesday = getTuesdayOfThisWeek(now);

  // 還沒到本週週二 04:00 → 不觸發
  if (now < thisWeekTuesday) return false;

  // 已過本週週二 04:00，但 lastFullSync 在本週週二 04:00 之前
  // → 表示本週還沒全量過 → 觸發
  return lastFullSync < thisWeekTuesday;
}

// 健康檢查：超過 14 天沒和雲端同步就提醒
// 使用 lastSyncTime（任何成功的同步都算）而非 lastFullSync
function checkSyncHealth() {
  const lastSync = parseInt(localStorage.getItem('lastSyncTime') || '0');
  if (lastSync === 0) return;  // 首次安裝不提醒（init 會自動全量）

  const now = Date.now();
  if (lastSync > now) return;  // 防呆：未來時間

  const days = Math.floor((now - lastSync) / (24 * 60 * 60 * 1000));
  if (days > SYNC_REMINDER_DAYS) {
    showSyncReminder(days);
  }
}

function showSyncReminder(days) {
  const el = document.getElementById('syncReminder');
  if (!el) return;
  document.getElementById('syncReminderDays').textContent = days;
  el.classList.toggle('urgent', days > SYNC_URGENT_DAYS);
  el.classList.add('show');
  pushLog(`⚠️ 已 ${days} 天未完整同步，建議立即同步`, 'warn');
}

function dismissSyncReminder() {
  const el = document.getElementById('syncReminder');
  if (el) el.classList.remove('show');
}

async function doSyncFromReminder() {
  const btn = event?.target;
  if (btn) btn.disabled = true;
  if (!isOnline()) {
    pushLog('目前離線，無法同步', 'warn');
    if (btn) btn.disabled = false;
    return;
  }
  // 強制走全量
  await fullSync('手動 - 健康檢查');
  // pullFromCloudFull 結束時會自動 dismissSyncReminder
  if (btn) btn.disabled = false;
}


const CAT_COLORS = ['#FF3B30','#FF6B35','#FF9500','#FFCC00','#34C759','#00C7BE','#007AFF','#5856D6','#AF52DE','#FF2D55','#8E8E93','#636366'];
let catColors = {};
const saveCatColors = () => localStorage.setItem('catColors', JSON.stringify(catColors));
const loadCatColors = () => { try { catColors = JSON.parse(localStorage.getItem('catColors')) || {}; } catch(e) { catColors = {}; } };
function getCatColor(name) {
  const cat = allC.find(c => c.name === name);
  return (cat && cat.color) ? cat.color : '#8E8E93';
}
function getContrastColor(hex) {
  if (!hex || !hex.startsWith('#')) return '#fff';
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b) / 255 > 0.55 ? '#1C1C1E' : '#fff';
}
function openColorPicker(catName, anchorEl) {
  const picker = document.getElementById('colorPicker');
  const current = getCatColor(catName);
  picker.innerHTML = CAT_COLORS.map(c =>
    `<div class="cp-swatch ${c===current?'selected':''}" style="background:${c}" onclick="pickColor('${catName}','${c}')"></div>`
  ).join('') +
  `<div class="cp-swatch" style="background:#fff;border:1.5px solid #E5E5EA;" title="移除顏色" onclick="pickColor('${catName}','')">
    <svg viewBox="0 0 24 24" fill="none" stroke="#C7C7CC" stroke-width="2.5" stroke-linecap="round" width="24" height="24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </div>`;
  const rect = anchorEl.getBoundingClientRect();
  picker.style.top = (rect.bottom + 6) + 'px';
  picker.style.left = Math.min(rect.left, window.innerWidth - 200) + 'px';
  picker.classList.add('open');
  setTimeout(() => {
    const close = (e) => {
      if (!picker.contains(e.target)) { picker.classList.remove('open'); document.removeEventListener('touchstart', close); document.removeEventListener('click', close); }
    };
    document.addEventListener('click', close, {once:false});
    document.addEventListener('touchstart', close, {once:false, passive:true});
  }, 50);
}
function pickColor(catName, color) {
  document.getElementById('colorPicker').classList.remove('open');
  const cat = allC.find(c => c.name === catName);
  if (cat) cat.color = color || '';
  if (color) catColors[catName] = color; else delete catColors[catName];
  // 只更新分類管理視窗內的預覽，不更新側欄（等按「完成」才生效）
  renderCatList();
  // 顏色操作合併：同一分類只保留最後一次
  _catPendingOps = _catPendingOps.filter(op => !(op.action === 'updateCategoryColor' && op.payload.name === catName));
  _catPendingOps.push({action:'updateCategoryColor', payload:{name:catName, rowId:cat?.rowId||null, color:color||''}, label:`設定「${catName}」顏色`});
}
function applyCatOrder() {
  const names = allC.map(c => c.name);
  const inOrder = catOrder.filter(n => names.includes(n));
  const notInOrder = allC.filter(c => !catOrder.includes(c.name));
  const inOrderObjs = inOrder.map(n => allC.find(c => c.name === n));
  allC = [...inOrderObjs, ...notInOrder];
  catOrder = allC.map(c => c.name);
}

document.addEventListener('focusin', e => {
  const tag = e.target.tagName;
  if (tag !== 'INPUT' && tag !== 'TEXTAREA' && tag !== 'SELECT') return;
  if (!e.target.closest('.modal')) { setTimeout(() => window.scrollTo(0,0), 80); }
});
document.addEventListener('focusout', e => {
  const modal = e.target.closest('.modal');
  if (!modal) { setTimeout(() => window.scrollTo(0,0), 80); return; }
  setTimeout(() => {
    if (!modal.contains(document.activeElement)) {
      const body = modal.querySelector('.sh-body');
      if (body) body.style.maxHeight = '';
      // 鍵盤收起後，modal 回到底部
      modal.querySelector('.sheet') && (modal.querySelector('.sheet').style.transform = '');
    }
  }, 150);
});

// 用 visualViewport 監聽鍵盤彈出，讓 modal 跟著往上移而不是縮小
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    if (_isDraggingModal) return;
    const modal = document.querySelector('.modal.open');
    if (!modal) return;
    const sheet = modal.querySelector('.sheet');
    if (!sheet) return;
    const kbH = window.innerHeight - window.visualViewport.height;
    if (kbH > 80) {
      if (modal.id === 'catM') {
        // catM：縮小 sh-body 讓 footer 保持在鍵盤上方
        const shBody = sheet.querySelector('.sh-body');
        if (shBody) {
          const visibleH = window.visualViewport.height;
          const footerEl = sheet.querySelector('.sh-body + div');
          const footerH = footerEl ? footerEl.getBoundingClientRect().height : 110;
          const handleEl = sheet.querySelector('.sh-handle');
          const titleEl = sheet.querySelector('.sh-title');
          const handleH = (handleEl ? handleEl.getBoundingClientRect().height : 20) +
                          (titleEl  ? titleEl.getBoundingClientRect().height  : 40);
          // visibleH = 鍵盤上方可用空間，catM 貼著底部
          // shBody 高度 = visibleH - handle - title - footer - 間距
          const maxBodyH = visibleH - handleH - footerH - 16;
          shBody.style.maxHeight = Math.max(80, maxBodyH) + 'px';
        }
      } else {
        const sheetRect = sheet.getBoundingClientRect();
        const visibleH = window.visualViewport.height;
        const overflow = sheetRect.bottom - visibleH;
        if (overflow > 0) {
          const maxMoveUp = Math.max(0, sheetRect.top - 8);
          const moveUp = Math.min(overflow + 8, maxMoveUp);
          sheet.style.transform = moveUp > 0 ? `translateY(-${moveUp}px)` : '';
        }
        // sh-body 滾動到 focus 的元素
        const focused = document.activeElement;
        if (focused && sheet.contains(focused)) {
          setTimeout(() => focused.scrollIntoView({ block: 'nearest', behavior: 'smooth' }), 100);
        }
      }
    } else {
      sheet.style.transform = '';
      // catM：恢復 sh-body 高度
      if (modal.id === 'catM') {
        const shBody = sheet.querySelector('.sh-body');
        if (shBody) shBody.style.maxHeight = '';
      }
    }
  });
}

let _txS = 0, _tyS = 0;
const _mainEl = document.getElementById('main');
_mainEl.addEventListener('touchstart', e => { _txS = e.touches[0].clientX; _tyS = e.touches[0].clientY; }, {passive:true});

  if (document.querySelector('.modal.open')) return;

// v500.13: 桌面版側邊欄拖曳調整寬度
let _resizing = false, _resizeStartX = 0, _resizeStartW = 0;
function sidebarResizeStart(e) {
  e.preventDefault();
  _resizing = true;
  _resizeStartX = e.clientX;
  _resizeStartW = document.getElementById('sidebar').offsetWidth;
  document.getElementById('sidebarResizer').classList.add('dragging');

  document.addEventListener('mousemove', sidebarResizeMove);
  document.addEventListener('mouseup', sidebarResizeEnd);

function sidebarResizeMove(e) {

  const newW = _resizeStartW + (e.clientX - _resizeStartX);
  const sb = document.getElementById('sidebar');
  // 即時套用、不存（拖曳中視覺反饋）
  const clamped = Math.max(0, Math.min(300, newW));
  sb.style.width = clamped + 'px';
  sb.classList.toggle('wide', clamped >= 100);
  // 即時更新 FAB 顯示

function sidebarResizeEnd(e) {

function enqueue(action, payload, label) {
  // ── 空 Task 攔截（v500 新增） ──
  if (action === 'addTask' || action === 'updateTask') {
    if (!payload.data?.task || !String(payload.data.task).trim()) {
      pushLog('空 Task 拒絕推送', 'warn');
      return;
    }
  }

  // ── 合併邏輯：只在「非 inflight 項目」之間合併 ──
  const nonInflight = pendingQueue.filter(q => !q.inflight);

  // setTaskStatus 同 id：後者覆蓋前者
  if (action === 'setTaskStatus') {
    const idx = nonInflight.findIndex(q => q.action === 'setTaskStatus' && q.payload.id === payload.id);
    if (idx > -1) {
      const targetOpId = nonInflight[idx]._opId;
      pendingQueue = pendingQueue.filter(q => q._opId !== targetOpId);
      pushLog(`覆蓋佇列：${label}`, 'warn');
    }
  }

  if (action === 'updateTask') {
    // 同 id 的 updateTask → 覆蓋
    const uIdx = nonInflight.findIndex(q => q.action === 'updateTask' && q.payload.id === payload.id);
    if (uIdx > -1) {
      const targetOpId = nonInflight[uIdx]._opId;
      pendingQueue = pendingQueue.filter(q => q._opId !== targetOpId);
      pushLog(`覆蓋佇列：${label}`, 'warn');
    }
    // 同 id 的 setTaskStatus → 把 status 合進 updateTask
    const sIdx = nonInflight.findIndex(q => q.action === 'setTaskStatus' && q.payload.id === payload.id);
    if (sIdx > -1) {
      const status = nonInflight[sIdx].payload.status;
      payload.data = {...payload.data, status};
      const targetOpId = nonInflight[sIdx]._opId;
      pendingQueue = pendingQueue.filter(q => q._opId !== targetOpId);
      pushLog(`合併 status+update：${label}`, 'warn');
    }
  }

  pendingQueue.push({
    action,
    payload,
    label,
    addedAt: Date.now(),
    _opId: `op_${Date.now()}_${Math.random().toString(36).slice(2,8)}`
  });
  pushLog(`佇列：${label}`, 'warn');
  saveLocal();
  updateBanner();
}
async function flushQueue() {
  // 清除超過 7 天的佇列項目（跳過 inflight）
  const expiry = 7 * 24 * 60 * 60 * 1000;
  const expired = pendingQueue.filter(i => !i.inflight && Date.now() - i.addedAt > expiry);
  if (expired.length) {
    const expiredIds = new Set(expired.map(i => i._opId));
    pendingQueue = pendingQueue.filter(i => !expiredIds.has(i._opId));
    pushLog(`清除 ${expired.length} 筆過期佇列`, 'warn');
    saveLocal();
  }

  // 偵測 inflight 卡住超過 5 分鐘（網路 timeout 或上次中斷）→ 重置
  const inflightTimeout = 5 * 60 * 1000;
  const stuck = pendingQueue.filter(i => i.inflight && Date.now() - (i.inflightAt || 0) > inflightTimeout);
  if (stuck.length > 0) {
    stuck.forEach(item => {
      delete item.inflight;
      delete item.inflightAt;
    });
    pushLog(`偵測到 ${stuck.length} 筆推送卡住超過 5 分鐘，已重置`, 'warn');
    saveLocal();
  }

  if (!pendingQueue.length) return true;
  if (!isOnline()) { pushLog('離線，佇列等待','warn'); return false; }

  // 推送前讀一次 session token，所有請求共用
  const sessionToken = getSession();
  if (!sessionToken) {
    pushLog('登入已過期，請重新登入', 'error');
    setTimeout(() => doLogout(), 2000);
    return false;
  }

  // 取出非 inflight 的項目來推送
  const toProcess = pendingQueue.filter(i => !i.inflight);
  if (!toProcess.length) return true;

  pushLog(`推送 ${toProcess.length} 筆…`, 'info');

  // ★ 標記 inflight 而非清空（v500 核心改動）
  const inflightTime = Date.now();
  const processingIds = new Set();
  toProcess.forEach(item => {
    item.inflight = true;
    item.inflightAt = inflightTime;
    processingIds.add(item._opId);
  });
  saveLocal();  // 立即寫入 localStorage，被殺也救得回來

  const catActions = ['addCategory','deleteCategory','renameCategory','reorderCategories','updateCategoryColor'];
  const catQueue = toProcess.filter(i => catActions.includes(i.action));
  const taskQueue = toProcess.filter(i => !catActions.includes(i.action));

  // 用 Set 追蹤推送結果
  const successIds = new Set();
  const failedIds = new Set();

  // 統一的 fetch with timeout（25秒）
  const batchFetch = (body, ms=25000) => {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), ms);
    return fetch(GAS_URL, {method:'POST', body, signal: ctrl.signal}).finally(() => clearTimeout(tid));
  };

  let unauthorizedDetected = false;

  // 分類操作：序列推送（避免 deleteRow 列號錯位）
  for (const item of catQueue) {
    if (unauthorizedDetected) break;
    try {
      const res = await batchFetch(JSON.stringify({action: item.action, token: sessionToken, ...item.payload}));
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      if (json.status === 'error' && json.message === 'unauthorized') {
        unauthorizedDetected = true;
        pushLog('登入已過期，請重新登入', 'error');
        setTimeout(() => doLogout(), 2000);
        break;
      }
      successIds.add(item._opId);
      pushLog(`✓ ${item.label}`, 'success');
    } catch(e) {
      failedIds.add(item._opId);
      pushLog(`✗ ${item.label}: ${e.message||'錯誤'}`, 'error');
    }
  }

  // 任務操作：addTask 獨立批次，其他操作分批平行推送
  const addTaskQueue = taskQueue.filter(i => i.action === 'addTask');
  const otherTaskQueue = taskQueue.filter(i => i.action !== 'addTask');

  // addTask：合併成一次 batchAddTasks
  if (addTaskQueue.length > 0 && !unauthorizedDetected) {
    try {
      const tasks = addTaskQueue.map(item => {
        const d = item.payload.data;
        return {
          ID: d?.ID || item.payload.id,
          task: d?.task || '',
          category: d?.category || '',
          dueDate: d?.dueDate || '',
          priority: d?.priority || 99,
          note: d?.note || '',
          mTime: d?.mTime || Date.now(),
        };
      });
      const res = await batchFetch(JSON.stringify({
        action: 'batchAddTasks',
        token: sessionToken,
        tasks
      }));
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      if (json.status === 'error' && json.message === 'unauthorized') {
        throw new Error('unauthorized');
      }
      if (json.status === 'success') {
        const writtenIds = new Set((json.written || []).map(String));
        const skippedIds = new Set((json.skipped || []).map(String));
        const classified = new Set([...writtenIds, ...skippedIds]);

        addTaskQueue.forEach(item => {
          const id = String(item.payload.id || item.payload.data?.ID || '');
          if (writtenIds.has(id)) {
            successIds.add(item._opId);
            pushLog(`✓ ${item.label}`, 'success');
          } else if (skippedIds.has(id)) {
            // 雲端已有此 ID（重複略過），視為成功
            successIds.add(item._opId);
            pushLog(`⚠️ ${item.label} 已存在，略過`, 'warn');
          } else if (!classified.has(id)) {
            // 未明確成功也未明確 skip → 視為失敗
            failedIds.add(item._opId);
            pushLog(`✗ ${item.label} 未確認，將重試`, 'warn');
          }
        });
      }
    } catch(e) {
      if (e.message === 'unauthorized') {
        unauthorizedDetected = true;
        pushLog('登入已過期，請重新登入', 'error');
        setTimeout(() => doLogout(), 2000);
      } else {
        pushLog(`✗ 批次新增失敗：${e.name === 'AbortError' ? '請求超時' : (e.message||'錯誤')}`, 'error');
        addTaskQueue.forEach(item => failedIds.add(item._opId));
      }
    }
  }

  // 其他任務操作（updateTask, setTaskStatus, toggleTask, deleteTask）：分批平行推送
  const BATCH_SIZE = 10;
  for (let i = 0; i < otherTaskQueue.length; i += BATCH_SIZE) {
    if (unauthorizedDetected) break;
    const batch = otherTaskQueue.slice(i, i + BATCH_SIZE);
    await Promise.all(batch.map(async item => {
      try {
        const res = await batchFetch(JSON.stringify({action: item.action, token: sessionToken, ...item.payload}));
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        if (json.status === 'error' && json.message === 'unauthorized') {
          throw new Error('unauthorized');
        }
        if (json.status === 'error') {
          // GAS 端錯誤（例如 task is empty、id not found）
          pushLog(`✗ ${item.label}: ${json.message || '錯誤'}`, 'error');
          // 邏輯錯誤不重試（避免無限循環）
          successIds.add(item._opId);  // 標記為「處理完成、不重試」
        } else {
          successIds.add(item._opId);
          pushLog(`✓ ${item.label}`, 'success');
        }
      } catch(e) {
        if (e.message === 'unauthorized') {
          unauthorizedDetected = true;
          pushLog('登入已過期，請重新登入', 'error');
          setTimeout(() => doLogout(), 2000);
        } else {
          failedIds.add(item._opId);
          pushLog(`✗ ${item.label}: ${e.name === 'AbortError' ? '請求超時' : (e.message||'錯誤')}`, 'error');
        }
      }
    }));
    if (i + BATCH_SIZE < otherTaskQueue.length && !unauthorizedDetected) await new Promise(r => setTimeout(r, 500));
  }

  // ★ 處理推送結果：更新 pendingQueue
  pendingQueue = pendingQueue.filter(item => {
    if (successIds.has(item._opId)) {
      return false;  // 成功：移除
    }
    if (failedIds.has(item._opId)) {
      // 失敗：取消 inflight 標記，留在佇列
      delete item.inflight;
      delete item.inflightAt;
      return true;
    }
    // 沒明確結果（中斷、unauthorized）：取消 inflight，留在佇列
    if (processingIds.has(item._opId)) {
      delete item.inflight;
      delete item.inflightAt;
    }
    return true;
  });
  saveLocal();

  // 記錄成功推送的操作，供驗證使用
  if (toProcess.length > 0) {
    const succeeded = toProcess.filter(i => successIds.has(i._opId));
    const importOps = succeeded.filter(op => op.label && op.label.startsWith('匯入'));

    if (importOps.length > 0 && failedIds.size === 0) {
      _lastFlushedOps = importOps;
      _pendingVerify = true;
    } else if (importOps.length > 0 && failedIds.size > 0) {
      _lastFlushedOps = importOps;
    } else {
      _lastFlushedOps = succeeded;
    }
  }

  updateBanner();
  updateSyncMeta();

  if (failedIds.size > 0) {
    pushLog(`${failedIds.size} 筆未成功，30 秒後自動重試`, 'warn');
    setTimeout(() => {
      if (pendingQueue.length && isOnline()) {
        pushLog('自動重試…', 'info');
        schedulePush(true);
      }
    }, 30000);
    return false;
  }
  return true;
}
async function verifyFlushedOps(cloudTasks, cloudCats) {
  if (!_lastFlushedOps.length) return;
  const ops = [..._lastFlushedOps];
  _lastFlushedOps = [];

  const sessionToken = getSession();
  if (!sessionToken) { pushLog('驗證跳過：未登入', 'warn'); return; }

  // 等待 1 秒，確保 GAS Sheets 寫入完成後再驗證
  await new Promise(r => setTimeout(r, 1000));

  // 整理需要驗證的任務 IDs 和分類操作
  const taskChecks = {}; // id → op
  const catChecks = [];

  ops.forEach(op => {
    if (['addTask','updateTask','toggleTask','setTaskStatus'].includes(op.action)) {
      const id = op.payload.id || op.payload.data?.ID;
      if (id) taskChecks[String(id)] = op;
    } else if (op.action === 'deleteTask') {
      const id = op.payload.id;
      if (id) taskChecks[String(id)] = op;
    } else if (op.action === 'addCategory') {
      catChecks.push({type:'exists', name:op.payload.name, op});
    } else if (op.action === 'deleteCategory') {
      catChecks.push({type:'notExists', name:op.payload.name, op});
    } else if (op.action === 'renameCategory') {
      catChecks.push({type:'renamed', oldName:op.payload.old, newName:op.payload.name, op});
    } else if (op.action === 'updateCategoryColor') {
      catChecks.push({type:'color', name:op.payload.name, color:op.payload.color||'', op});
    }
  });

  const retryOps = [];
  const verifyFetch = (body, ms=25000) => {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), ms);
    return fetch(GAS_URL, {method:'POST', body, signal: ctrl.signal}).finally(() => clearTimeout(tid));
  };

  // 驗證任務
  if (Object.keys(taskChecks).length > 0) {
    try {
      const res = await verifyFetch(JSON.stringify({action:'verifyTasks', ids: Object.keys(taskChecks), token: sessionToken}));
      const json = await res.json();
      if (json.status === 'success') {
        const results = json.results || {};
        Object.entries(taskChecks).forEach(([id, op]) => {
          const existsInCloud = results[id] === true;
          const shouldExist = op.action !== 'deleteTask';
          if (existsInCloud !== shouldExist) {
            // 驗證失敗，檢查重試次數
            const key = `${op.action}_${id}`;
            _verifyRetryCount[key] = (_verifyRetryCount[key] || 0) + 1;
            if (_verifyRetryCount[key] <= 3) {
              retryOps.push(op);
              pushLog(`驗證失敗：${op.label}（第 ${_verifyRetryCount[key]} 次）`, 'warn');
            } else {
              pushLog(`⚠️ ${op.label} 無法同步，請手動檢查`, 'error');
              // 即使放棄，也清除計數，避免下次手動同步永遠無法重試
              delete _verifyRetryCount[key];
              if (_importTotal > 0) importProgressError('部分資料無法確認寫入，請手動同步');
            }
          } else {
            // 驗證成功，清除重試計數
            delete _verifyRetryCount[`${op.action}_${id}`];
          }
        });
      }
    } catch(e) {
      pushLog(`驗證任務失敗：${e.name === 'AbortError' ? '請求超時' : e.message}`, 'warn');
      // ★ timeout 不再視為通過：把所有 taskChecks 放回 retry（受 _verifyRetryCount 限制）
      Object.entries(taskChecks).forEach(([id, op]) => {
        const key = `${op.action}_${id}`;
        _verifyRetryCount[key] = (_verifyRetryCount[key] || 0) + 1;
        if (_verifyRetryCount[key] <= 3) {
          retryOps.push(op);
        } else {
