  if (catChecks.length > 0) {
    try {
      const res = await verifyFetch(JSON.stringify({action:'verifyCategories', checks: catChecks.map(c => ({type:c.type, name:c.name, color:c.color, oldName:c.oldName, newName:c.newName})), token: sessionToken}));
      const json = await res.json();
      if (json.status === 'success') {
        (json.results || []).forEach((r, i) => {
          const {op} = catChecks[i];
          if (!r.ok) {
            const key = `${op.action}_${op.payload.name}`;
            _verifyRetryCount[key] = (_verifyRetryCount[key] || 0) + 1;
            if (_verifyRetryCount[key] <= 3) {
              retryOps.push(op);
              pushLog(`驗證失敗：${op.label}（第 ${_verifyRetryCount[key]} 次）`, 'warn');
            } else {
              pushLog(`⚠️ ${op.label} 無法同步，請手動檢查`, 'error');
              delete _verifyRetryCount[key];  // 清除計數，允許未來再嘗試
              if (_importTotal > 0) importProgressError('部分資料無法確認寫入，請手動同步');
            }
          } else {
            delete _verifyRetryCount[`${op.action}_${op.payload.name}`];
          }
        });
      }
    } catch(e) {
      pushLog(`驗證分類失敗：${e.name === 'AbortError' ? '請求超時' : e.message}`, 'warn');
      // timeout 也計入重試
      catChecks.forEach(({op}) => {
        const key = `${op.action}_${op.payload.name}`;
        _verifyRetryCount[key] = (_verifyRetryCount[key] || 0) + 1;
        if (_verifyRetryCount[key] <= 3) {
          retryOps.push(op);
        } else {
          delete _verifyRetryCount[key];
        }
      });
    }
  }

  // 有驗證失敗的操作，放回佇列重試
  if (retryOps.length > 0) {
    pendingQueue = [...retryOps, ...pendingQueue];
    saveLocal(); updateBanner(); updateSyncMeta();
    pushLog(`${retryOps.length} 筆驗證失敗，30 秒後自動重試`, 'warn');
    if (_importTotal > 0) importProgressVerifyDone(retryOps.length);
    setTimeout(() => {
      if (pendingQueue.length && isOnline()) schedulePush(true);
    }, 30000);
  } else {
    if (_importTotal > 0) importProgressVerifyDone(0);
  }
}

async function pullFromCloud(reason, attempt=1) {
  if (!isOnline()) { pushLog('離線略過拉取','warn'); return false; }

  // ── 保護：分類管理視窗開著時跳過拉取（避免覆蓋使用者編輯）──
  const catMOpen = document.getElementById('catM');
  if (catMOpen && catMOpen.classList.contains('open')) {
    pushLog('分類管理開啟中，跳過拉取', 'warn');
    return false;
  }

  if (attempt === 1) {
    pushLog(`拉取雲端… (${reason})`, 'info');
    _prePullLocalTasks = allT.map(t => ({...t}));
  } else {
    pushLog(`重試第 ${attempt} 次…`, 'info');
  }

  try {
    const sessionToken = getSession();
    if (!sessionToken) {
      pushLog('登入已過期，請重新登入', 'error');
      setTimeout(() => doLogout(), 2000);
      return false;
    }

    const fetchWithTimeout = (url, ms=25000) => {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), ms);
      return fetch(url, {signal: ctrl.signal}).finally(() => clearTimeout(tid));
    };

    // 路徑 1：週二全量強制（最優先）
    if (needsWeeklyFullSync()) {
      pushLog('本週首次同步，執行全量', 'info');
      return await pullFromCloudFull(reason, attempt, fetchWithTimeout);
    }

    // 路徑 2：checkSync 流程（attempt 1 才嘗試，有本機資料才嘗試）
    if (attempt === 1 && lastSyncTime > 0 && allT.length > 0) {
      try {
        const checkRes = await fetchWithTimeout(
          `${GAS_URL}?action=checkSync&token=${sessionToken}&since=${lastSyncTime}`
        ).then(r => r.json());

        if (checkRes && checkRes.status === 'error' && checkRes.message === 'unauthorized') {
          pushLog('登入已過期，請重新登入', 'error');
          setTimeout(() => doLogout(), 2000);
          return false;
        }

        if (checkRes && checkRes.status === 'success') {
          // v500.7: count 比對（補救 onChange 延遲未觸發的情境）
          // v500.8: 比對前先 autoCleanDone，讓本機 allT 對齊當前 cutoff
          //         避免 GAS/前端 cutoff 時間漂移造成的無謂全量
          if (typeof checkRes.cloudCount === 'number') {
            autoCleanDone();  // 純 filter，O(n)，極快
            const pendingAddIds = new Set(
              pendingQueue
                .filter(q => q.action === 'addTask' && q.payload?.data)
                .map(q => String(q.payload.data.ID || q.payload.id))
            );
            // 本機已存在 + 不在 pendingQueue 內的數量（與雲端可比的部分）
            const localCount = allT.filter(t => !pendingAddIds.has(String(t.ID))).length;
            if (localCount !== checkRes.cloudCount) {
              pushLog(`數量不符（本機 ${localCount} / 雲端 ${checkRes.cloudCount}），執行全量`, 'warn');
              return await pullFromCloudFull(reason, attempt, fetchWithTimeout);
            }
          }

          // 子路徑 A：無任何變動 → 輕量結束
          if (!checkRes.hasUpdate && !checkRes.hasDelete && !checkRes.hasCatUpdate) {
            lastSyncTime = Date.now();
            localStorage.setItem('lastSyncTime', String(lastSyncTime));
            _prePullLocalTasks = [];
            // 成功確認雲端與本機一致 → 視為「已同步」，移除健康提醒
            dismissSyncReminder();
            pushLog('雲端無變動', 'success');
            updateSyncMeta();
            return true;
          }

          // 子路徑 B：有刪除事件 → 走全量
          if (checkRes.hasDelete) {
            pushLog('偵測到雲端刪除事件，執行全量', 'info');
            return await pullFromCloudFull(reason, attempt, fetchWithTimeout);
          }

          // 子路徑 C：只有更新（任務或分類）→ 增量
          return await pullFromCloudIncremental(reason, checkRes.hasCatUpdate, fetchWithTimeout, sessionToken);
        }
      } catch(e) {
        pushLog(`checkSync 失敗，改走全量: ${e.message||'錯誤'}`, 'warn');
      }
    }

    // 路徑 3：fallback 全量（首次安裝、checkSync 失敗、attempt > 1）
    return await pullFromCloudFull(reason, attempt, fetchWithTimeout);

  } catch(e) {
    if (attempt < 3 && isOnline()) {
      pushLog(`拉取失敗，${attempt * 5} 秒後重試…`, 'warn');
      await new Promise(r => setTimeout(r, attempt * 5000));
      return pullFromCloud(reason, attempt + 1);
    }
    pushLog(`拉取失敗：${e.message||'錯誤'}`, 'error');
    return false;
  }
}

// 全量拉取：取代整個 allT 和 allC（v500 拆分出來方便共用）
async function pullFromCloudFull(reason, attempt, fetchWithTimeout) {
  const sessionToken = getSession();
  if (!sessionToken) return false;

  try {
    const [resT, resC] = await Promise.all([
      fetchWithTimeout(`${GAS_URL}?action=getTasks&token=${sessionToken}`).then(r => r.json()),
      fetchWithTimeout(`${GAS_URL}?action=getCategories&token=${sessionToken}`).then(r => r.json())
    ]);

    if (!Array.isArray(resT)) {
      if (resT && resT.status === 'error' && resT.message === 'unauthorized') {
        pushLog('登入已過期，請重新登入', 'error');
        setTimeout(() => doLogout(), 2000);
        return false;
      }
      pushLog('拉取失敗：Tasks 資料異常', 'error'); return false;
    }
    if (!Array.isArray(resC)) {
      if (resC && resC.status === 'error' && resC.message === 'unauthorized') {
        pushLog('登入已過期，請重新登入', 'error');
        setTimeout(() => doLogout(), 2000);
        return false;
      }
      pushLog('拉取失敗：Categories 資料異常', 'error'); return false;
    }

    // ★ filter：只保留近 6 個月內已完成 + 所有 Pending
    allT = resT.filter(shouldKeep).map(t => ({
      ...t,
      Task:     String(t.Task     || ''),
      Category: String(t.Category || ''),
      Note:     String(t.Note     || ''),
      Status:   String(t.Status   || 'Pending'),
      Priority: Number(t.Priority) || 99,
      ID:       String(t.ID       || ''),
    }));

    // 合併保護：pendingQueue 裡還沒推送的 addTask，避免被 pullFromCloud 覆蓋
    const cloudIds = new Set(allT.map(t => String(t.ID)));
    pendingQueue.filter(q => q.action === 'addTask' && q.payload && q.payload.data).forEach(q => {
      const d = q.payload.data;
      const id = String(d.ID || q.payload.id);
      if (!cloudIds.has(id)) {
        allT.push({
          ID: id,
          Task: String(d.task || ''),
          Category: String(d.category || ''),
          DueDate: d.dueDate || '',
          Status: 'Pending',
          Priority: Number(d.priority) || 99,
          Note: String(d.note || ''),
          mTime: d.mTime || Date.now(),
        });
        cloudIds.add(id);
      }
    });

    // 合併保護：以本機較新的 mTime 為準
    const localSnapshot = _prePullLocalTasks || [];
    if (localSnapshot.length > 0) {
      allT = allT.map(cloudTask => {
        const local = localSnapshot.find(l => String(l.ID) === String(cloudTask.ID));
        if (local && Number(local.mTime) > Number(cloudTask.mTime)) {
          return local;
        }
        return cloudTask;
      });
    }

    // 處理分類
    const filtered = resC.filter(c => c && (typeof c === 'string' ? c !== "Category Name" : c.name !== "Category Name"));
    const hasSortOrder = filtered.some(c => typeof c === 'object' && c.sortOrder !== undefined);
    const toObj = c => typeof c === 'string' ? {name:c, rowId:null, color:'', sortOrder:0} : {name:c.name, rowId:c.RowID||c.rowId||null, color:c.color||c.Color||'', sortOrder:c.sortOrder||c.SortOrder||0};
    if (hasSortOrder) {
      filtered.sort((a, b) => (a.sortOrder||a.SortOrder||0) - (b.sortOrder||b.SortOrder||0));
      allC = filtered.map(toObj);
      catOrder = allC.map(c => c.name);
    } else {
      allC = filtered.map(toObj);
      applyCatOrder();
    }
    allC.forEach(c => {
      if (c.color) catColors[c.name] = c.color;
      else delete catColors[c.name];
    });
    saveCatColors();

    // ★ 全量路徑統一更新：lastSyncTime + lastFullSync + 清提醒
    saveLocal();
    pushLog(`完成：${allT.length} 任務 / ${allC.length} 分類`, 'success');
    lastSyncTime = Date.now();
    localStorage.setItem('lastSyncTime', String(lastSyncTime));
    localStorage.setItem('lastFullSync', String(lastSyncTime));
    dismissSyncReminder();
    _pendingVerify = false;
    _prePullLocalTasks = [];

    if (_lastFlushedOps.length > 0) {
      await verifyFlushedOps(allT, allC);
    }
    renderAll();
    updateSyncMeta();
    return true;
  } catch(e) {
    if (attempt < 3 && isOnline()) {
      pushLog(`拉取失敗，${attempt * 5} 秒後重試…`, 'warn');
      await new Promise(r => setTimeout(r, attempt * 5000));
      return pullFromCloud(reason, attempt + 1);
    }
    pushLog(`拉取失敗：${e.message||'錯誤'}`, 'error');
    return false;
  }
}

// 增量拉取：只更新變動的部分（v500 新增）
async function pullFromCloudIncremental(reason, hasCatUpdate, fetchWithTimeout, sessionToken) {
  try {
    const calls = [
      fetchWithTimeout(`${GAS_URL}?action=getTasks&token=${sessionToken}&since=${lastSyncTime}`).then(r => r.json())
    ];
    if (hasCatUpdate) {
      calls.push(fetchWithTimeout(`${GAS_URL}?action=getCategories&token=${sessionToken}`).then(r => r.json()));
    }

    const results = await Promise.all(calls);
    const resT = results[0];
    const resC = hasCatUpdate ? results[1] : null;

    if (!Array.isArray(resT)) {
      if (resT && resT.status === 'error' && resT.message === 'unauthorized') {
        pushLog('登入已過期，請重新登入', 'error');
        setTimeout(() => doLogout(), 2000);
        return false;
      }
      pushLog('增量拉取失敗：Tasks 資料異常', 'error');
      return false;
    }

    // 增量 merge 任務（mTime 較新者勝 + filter）
    let mergedCount = 0;
    resT.forEach(newT => {
      const normalized = {
        ...newT,
        Task:     String(newT.Task     || ''),
        Category: String(newT.Category || ''),
        Note:     String(newT.Note     || ''),
        Status:   String(newT.Status   || 'Pending'),
        Priority: Number(newT.Priority) || 99,
        ID:       String(newT.ID       || ''),
      };

      // filter：被擋下的不加入 allT
      if (!shouldKeep(normalized)) return;

      const idx = allT.findIndex(t => String(t.ID) === String(normalized.ID));
      if (idx > -1) {
        // 已存在：只有雲端更新時才覆蓋
        if (Number(normalized.mTime) > Number(allT[idx].mTime || 0)) {
          allT[idx] = normalized;
          mergedCount++;
        }
      } else {
        // 不存在：新增
        allT.push(normalized);
        mergedCount++;
      }
    });

    // 處理分類（如果有變動）
    if (resC && Array.isArray(resC)) {
      const filtered = resC.filter(c => c && (typeof c === 'string' ? c !== "Category Name" : c.name !== "Category Name"));
      const hasSortOrder = filtered.some(c => typeof c === 'object' && c.sortOrder !== undefined);
      const toObj = c => typeof c === 'string' ? {name:c, rowId:null, color:'', sortOrder:0} : {name:c.name, rowId:c.RowID||c.rowId||null, color:c.color||c.Color||'', sortOrder:c.sortOrder||c.SortOrder||0};
      if (hasSortOrder) {
        filtered.sort((a, b) => (a.sortOrder||a.SortOrder||0) - (b.sortOrder||b.SortOrder||0));
        allC = filtered.map(toObj);
        catOrder = allC.map(c => c.name);
      } else {
        allC = filtered.map(toObj);
        applyCatOrder();
      }
      allC.forEach(c => {
        if (c.color) catColors[c.name] = c.color;
        else delete catColors[c.name];
      });
      saveCatColors();
    }

    saveLocal();
    pushLog(`增量同步：${mergedCount} 筆變動`, 'success');
    lastSyncTime = Date.now();
    localStorage.setItem('lastSyncTime', String(lastSyncTime));
    // ★ 注意：增量同步不更新 lastFullSync（這由全量路徑負責）
    // 但成功完成增量同步表示資料是新的 → 移除健康提醒
    dismissSyncReminder();
    _pendingVerify = false;
    _prePullLocalTasks = [];

    if (_lastFlushedOps.length > 0) {
      await verifyFlushedOps(allT, allC);
    }
    renderAll();
    updateSyncMeta();
    return true;
  } catch(e) {
    pushLog(`增量拉取失敗，下次會 fallback 全量: ${e.message||'錯誤'}`, 'warn');
    return false;
  }
}

  await fullSync('手動重試');

async function lightVerify() {
  if (!_lastFlushedOps.length) return;
  const ops = [..._lastFlushedOps];
  _lastFlushedOps = [];

  const sessionToken = getSession();
  if (!sessionToken) return;

  // 等 1 秒確保 GAS 寫入完成
  await new Promise(r => setTimeout(r, 1000));

  // 只驗證任務類操作
  const taskChecks = {};
  ops.forEach(op => {
    if (['addTask','updateTask','toggleTask','setTaskStatus'].includes(op.action)) {
      const id = op.payload.id || op.payload.data?.ID;
      if (id) taskChecks[String(id)] = op;
    } else if (op.action === 'deleteTask') {
      const id = op.payload.id;
      if (id) taskChecks[String(id)] = op;
    }
  });

  if (Object.keys(taskChecks).length === 0) return;

  try {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 35000);
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({action:'verifyTasks', ids: Object.keys(taskChecks), token: sessionToken}),
      signal: ctrl.signal
    });
    clearTimeout(tid);
    const json = await res.json();
    if (json.status !== 'success') return;

    const results = json.results || {};
    const retryOps = [];
    Object.entries(taskChecks).forEach(([id, op]) => {
      const existsInCloud = results[id] === true;
      const shouldExist = op.action !== 'deleteTask';
      if (existsInCloud !== shouldExist) {
        const key = `${op.action}_${id}`;
        _verifyRetryCount[key] = (_verifyRetryCount[key] || 0) + 1;
        if (_verifyRetryCount[key] <= 3) {
          retryOps.push(op);
          pushLog(`驗證失敗：${op.label}（第 ${_verifyRetryCount[key]} 次）`, 'warn');
        } else {
          pushLog(`⚠️ ${op.label} 無法同步，請手動立即同步`, 'error');
          delete _verifyRetryCount[key];  // 清除計數，允許未來再嘗試
        }
      } else {
        delete _verifyRetryCount[`${op.action}_${id}`];
      }
    });

    if (retryOps.length > 0) {
      pendingQueue = [...retryOps, ...pendingQueue];
      saveLocal(); updateBanner();
      pushLog(`${retryOps.length} 筆驗證失敗，30 秒後自動重試`, 'warn');
      setTimeout(() => {
        if (pendingQueue.length && isOnline()) schedulePush(true);
      }, 30000);
    } else {
      if (_importTotal > 0) importProgressVerifyDone(0);
    }
  } catch(e) {
    pushLog(`輕量驗證失敗：${e.name === 'AbortError' ? '請求超時' : e.message}`, 'warn');
    if (_importTotal > 0) importProgressVerifyDone(0);
  }
}

async function fullSync(reason) {
  if (isSyncRunning) return false; isSyncRunning = true; updateBanner();
  let success = false;
  try {
    const flushed = await flushQueue();
    if (flushed) {
      const pulled = await pullFromCloud(reason);
      success = pulled === true;
    }
  } finally {
    isSyncRunning = false; updateBanner(); updateSyncMeta();
    // 同步期間若有新操作加入佇列，立即觸發推送
    if (pendingQueue.length > 0) {
      pushLog(`同步完成後發現 ${pendingQueue.length} 筆新操作，立即推送`, 'info');
      schedulePush(true); // 立即推送，不等 10 秒
    }
  }
  return success;
}
let _pushDebounceTimer = null;
let _pushForceTimer = null; // 最大等待計時器（60秒強制推送）

function schedulePush(immediate = false) {
  if (_pushDebounceTimer) clearTimeout(_pushDebounceTimer);
  // immediate 時也清除強制計時器（避免殘留）
  if (immediate && _pushForceTimer) { clearTimeout(_pushForceTimer); _pushForceTimer = null; }
  _pushDebounceTimer = setTimeout(async () => {
    // 清除強制計時器
    if (_pushForceTimer) { clearTimeout(_pushForceTimer); _pushForceTimer = null; }
    _pushDebounceTimer = null;
    if (!isOnline() || !pendingQueue.length) return;
    if (isSyncRunning) return;
    const flushed = await flushQueue();
    if (_pendingVerify) {
      _pendingVerify = false; // 無論推送成敗，清除標記避免卡住
      if (flushed && pendingQueue.length === 0) {
        await fullSync('匯入驗證');
      } else {
        updateBanner(); updateSyncMeta();
      }
    } else if (flushed && _lastFlushedOps.length > 0) {
      await lightVerify();
      updateBanner(); updateSyncMeta();
    } else {
      updateBanner(); updateSyncMeta();
    }
  }, immediate ? 0 : 10000);

  // 第一筆進佇列時啟動最大等待計時（60秒強制推送）
  if (!_pushForceTimer && !immediate) {
    _pushForceTimer = setTimeout(() => {
      _pushForceTimer = null;
      if (_pushDebounceTimer) { clearTimeout(_pushDebounceTimer); _pushDebounceTimer = null; }
      pushLog('強制推送（操作超過 60 秒未同步）', 'info');
      schedulePush(true);
    }, 60000);
  }
}

// 回到前景（解鎖/切回App）→ 檢查佇列繼續推送
// v500: 離開超過 5 分鐘 → 自動 fullSync 拉取最新資料
let _lastBgTime = 0;
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') {
    _lastBgTime = Date.now();
    if (pendingQueue.length > 0 && isOnline() && !isSyncRunning) {
      // 取消 debounce，立即推送（用 immediate 模式）
      schedulePush(true);
    }
  } else if (document.visibilityState === 'visible') {
    // 離開超過 5 分鐘 → 完整同步（推送 + 拉取）
    if (_lastBgTime > 0 && Date.now() - _lastBgTime > 5 * 60 * 1000) {
      if (isOnline() && !isSyncRunning) {
        fullSync('回前景檢查');
      }
    } else if (pendingQueue.length > 0 && isOnline()) {
      // 短時間切回，只推送佇列（既有行為）
      schedulePush(true);
    }
  }
});

function _startHandleDrag(modal, id) {
  const handle = modal.querySelector('.sh-handle'), sheet = modal.querySelector('.sheet');
  if (!handle || !sheet) return;
  // 移除舊的監聽器（防止記憶體洩漏）
  if (modal._dragStart) {
    handle.removeEventListener('touchstart', modal._dragStart);
    handle.removeEventListener('touchmove',  modal._dragMove);
    handle.removeEventListener('touchend',   modal._dragEnd);
  }
  let startY = 0;
  modal._dragStart = (e) => {
    startY = e.touches[0].clientY; _isDraggingModal = true;
    sheet.style.transition = 'none'; modal.style.transition = 'none';
  };
  modal._dragMove = (e) => {
    if (!_isDraggingModal) return;
    const dy = e.touches[0].clientY - startY; if (dy < 0) return;
    sheet.style.transform = `translateY(${dy}px)`;
  };
  modal._dragEnd = (e) => {
    if (!_isDraggingModal) return; _isDraggingModal = false; sheet.style.transition = '';
    if (e.changedTouches[0].clientY - startY > 80) {
      if (id === 'catM') cancelCatM();
      else closeModal(id);
    }
    else { sheet.style.transform = ''; modal.style.transition = ''; }
  };
  handle.addEventListener('touchstart', modal._dragStart, {passive:true});
  handle.addEventListener('touchmove',  modal._dragMove,  {passive:true});
  handle.addEventListener('touchend',   modal._dragEnd,   {passive:true});
}

  }).join('');

function delC(name, rowId) {
  if (!confirm(`刪除分類「${name}」？`)) return; playSound('delete');
  allC = allC.filter(c => c.name !== name);
  catOrder = catOrder.filter(c => c !== name);
  // 移除同一分類之前暫存的新增、顏色操作（不需推送）
  _catPendingOps = _catPendingOps.filter(op =>
    !(op.action === 'addCategory' && op.payload.name === name) &&
    !(op.action === 'updateCategoryColor' && op.payload.name === name)
  );
  _catPendingOps.push({action:'deleteCategory', payload:{name, rowId}, label:`刪除分類「${name}」`});
  // 刪除後更新排序，移除舊的 reorderCategories
  if (allC.length > 0) {
    _catPendingOps = _catPendingOps.filter(op => op.action !== 'reorderCategories');
    const order = allC.map((c, i) => ({name:c.name, rowId:c.rowId||null, sortOrder:(i+1)*10, color:c.color||''}));
    _catPendingOps.push({action:'reorderCategories', payload:{order}, label:'分類順序已調整'});
  }
  // 只更新視窗內預覽，不更新側欄（等按「完成」才生效）
  renderCatList();
}
function renameC(oldN) {
  const newN = prompt("新名稱：", oldN); if (!newN||newN===oldN) return;
  // 檢查重複
  if (allC.some(c => c.name === newN)) {
    alert(`分類「${newN}」已存在`); return;
  }
  playSound('tap');
  const cat = allC.find(c => c.name === oldN);
  allC = allC.map(c => c.name === oldN ? {...c, name:newN} : c);
  catOrder = catOrder.map(c => c === oldN ? newN : c);
  allT.forEach(t => { if(t.Category === oldN) t.Category = newN; });
  // 如果之前有暫存該分類的新增操作，只更新名稱，不需要再推送 renameCategory
  const hasAddOp = _catPendingOps.some(op => op.action === 'addCategory' && op.payload.name === oldN);
  _catPendingOps = _catPendingOps.map(op => {
    if (op.action === 'addCategory' && op.payload.name === oldN)
      return {...op, payload:{...op.payload, name:newN}, label:`新增分類「${newN}」`};
    // 同步更新顏色操作裡的名稱
    if (op.action === 'updateCategoryColor' && op.payload.name === oldN)
      return {...op, payload:{...op.payload, name:newN}, label:`設定「${newN}」顏色`};
    return op;
  });
  // 雲端已有的分類才需要推送 renameCategory
  if (!hasAddOp) {
    _catPendingOps.push({action:'renameCategory', payload:{old:oldN, name:newN, rowId:cat?.rowId||null}, label:`改名「${oldN}」→「${newN}」`});
  }
  // 只更新視窗內預覽和任務清單（分類名稱變更需即時反映在任務上），不存檔（等按「完成」才生效）
  renderCatList(); render();
}

  try { return JSON.parse(localStorage.getItem(ARRIVAL_KEY)) || []; } catch(e) { return []; }

  if (btn.classList.contains('recorded')) {
    // 已記錄 → 確認後清除
    if (confirm('確定清除到場時間？')) {
      btn.textContent = '到場時間';
      btn.classList.remove('recorded');
    }
  } else {
    // 未記錄 → 記錄當下時間
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const timeStr = hh + ':' + mm;
    btn.textContent = timeStr;
    btn.classList.add('recorded');
    // 寫入歷史記錄
    const history = getArrivalHistory();
    const dateStr = now.getFullYear() + '/' +
      String(now.getMonth()+1).padStart(2,'0') + '/' +
      String(now.getDate()).padStart(2,'0');
    history.unshift({ time: timeStr, date: dateStr });
    if (history.length > ARRIVAL_MAX) history.splice(ARRIVAL_MAX);
    saveArrivalHistory(history);
  }
}

function _getAudioCtx() { if (!_audioCtx) _audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return _audioCtx; }

// v500.11: 移除 iOS haptic 機制（iOS 18 已封住 <input switch> 觸發 Taptic Engine 的路徑）
//          純粹靠強化音效（v500.5 的 triangle 波 + 2.5x 音量 + attack）作為操作回饋

function playSound(type) {
  if (!_soundEnabled) return;
  try {
    const ctx = _getAudioCtx();
    if (ctx.state === 'suspended') { ctx.resume().then(() => playSound(type)); return; }
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    const now = ctx.currentTime;

    // v500.4: 統一 attack（5ms 從 0 升到峰值，提升打擊感）
    const setupGain = (peak, decay) => {
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(peak, now + 0.005);
      gain.gain.exponentialRampToValueAtTime(0.001, now + decay);
    };

    osc.type = 'triangle';  // v500.4: 從 sine 改 triangle，更清脆

    if (type==='tap')         { osc.frequency.setValueAtTime(880,now); osc.frequency.exponentialRampToValueAtTime(660,now+0.06); setupGain(0.30,0.08); osc.start(now); osc.stop(now+0.08); }
    else if (type==='done')   { osc.frequency.setValueAtTime(660,now); osc.frequency.setValueAtTime(880,now+0.07); setupGain(0.35,0.18); osc.start(now); osc.stop(now+0.18); }
    else if (type==='add')    { osc.frequency.setValueAtTime(740,now); osc.frequency.exponentialRampToValueAtTime(1000,now+0.1); setupGain(0.30,0.12); osc.start(now); osc.stop(now+0.12); }
    else if (type==='delete') { osc.frequency.setValueAtTime(440,now); osc.frequency.exponentialRampToValueAtTime(220,now+0.12); setupGain(0.30,0.14); osc.start(now); osc.stop(now+0.14); }
    else if (type==='close')  { osc.frequency.setValueAtTime(500,now); osc.frequency.exponentialRampToValueAtTime(280,now+0.1); setupGain(0.22,0.12); osc.start(now); osc.stop(now+0.12); }
    else if (type==='select') { osc.frequency.setValueAtTime(520,now); osc.frequency.exponentialRampToValueAtTime(440,now+0.07); setupGain(0.25,0.09); osc.start(now); osc.stop(now+0.09); }
    else if (type==='swipe')  { osc.frequency.setValueAtTime(300,now); osc.frequency.exponentialRampToValueAtTime(700,now+0.08); setupGain(0.20,0.1); osc.start(now); osc.stop(now+0.1); }
  } catch(e) {}
}

// ── Excel / CSV 批次匯入 ─────────────────────────────────────
let _importRows=[], _importHeaders=[];
async function handleImport(event) {
  const file=event.target.files[0]; if(!file) return; event.target.value='';
  const resultEl=document.getElementById('importResult');
  resultEl.style.display='block'; resultEl.className='import-result'; resultEl.textContent='解析檔案中…';
  try {
    let rows=[];
    if (file.name.endsWith('.csv')) rows=await parseCsv(file); else rows=await parseXlsx(file);
    if (!rows.length||!rows[0].length) { resultEl.className='import-result err'; resultEl.textContent='檔案內容為空，請確認格式正確。'; return; }
    _importRows=rows; _importHeaders=rows[0].map(h=>String(h).trim());
    const selects=['mapTask','mapCategory','mapDueDate','mapPriority','mapNote'];
    const autoMap={ mapTask:['task','任務','任務名稱','title','名稱','主旨','subject'], mapCategory:['category','分類','cat'], mapDueDate:['duedate','due date','due','截止日期','日期','date','期限','deadline','結束日期'], mapPriority:['priority','優先級','優先','pri'], mapNote:['note','備註','notes','描述'] };
    selects.forEach(id=>{
      const sel=document.getElementById(id);
      sel.innerHTML='<option value="-1">— 不匯入 —</option>'+_importHeaders.map((h,i)=>`<option value="${i}">${h}</option>`).join('');
      const autoIdx=_importHeaders.findIndex(h=>autoMap[id].some(k=>h.toLowerCase().replace(/\s/g,'')=== k.replace(/\s/g,'')));
      sel.value=autoIdx>=0?autoIdx:-1;
    });
    document.getElementById('importMapSub').textContent=`共 ${rows.length-1} 筆資料，請確認欄位對應後按「開始匯入」`;
    resultEl.style.display='none'; document.getElementById('importMapModal').classList.add('open');
  } catch(e) { resultEl.className='import-result err'; resultEl.textContent='解析失敗：'+(e.message||'未知錯誤'); }
}
function closeImportMap() { document.getElementById('importMapModal').classList.remove('open'); _importRows=[]; _importHeaders=[]; }
async function confirmImport() {
  const idxTask=parseInt(document.getElementById('mapTask').value);
  const idxCategory=parseInt(document.getElementById('mapCategory').value);
  const idxDueDate=parseInt(document.getElementById('mapDueDate').value);
  const idxPriority=parseInt(document.getElementById('mapPriority').value);
  const idxNote=parseInt(document.getElementById('mapNote').value);
  if (idxTask<0) { alert('請選擇「任務名稱」對應的欄位'); return; }

  const resultEl=document.getElementById('importResult');
  const dataRows=_importRows.slice(1).filter(r=>r.some(c=>String(c).trim()));
  if (!dataRows.length) { resultEl.style.display='block'; resultEl.className='import-result err'; resultEl.textContent='沒有可匯入的資料'; return; }

  // 關閉匯入視窗，顯示進度
  closeImportMap();
  resultEl.style.display='block'; resultEl.className='import-result ok';
  resultEl.textContent='準備中，同步雲端資料…';

  // 禁用匯入按鈕
  const importBtn = document.querySelector('.import-btn');
  if (importBtn) { importBtn.disabled = true; importBtn.style.opacity = '0.4'; }

  // 步驟一：先 pullFromCloud 取得最新雲端資料
  importProgressShowPull();
  if (isOnline()) {
    await pullFromCloud('匯入前同步');
  }

  // 步驟二：本機比對，剔除重複（用最新的 allT）
  importProgressShowCompare();
  // 建立本機任務索引（O(n)），避免每筆都線性掃描 allT
  const existingSet = new Set(
    allT.filter(t => t.Status !== 'Done')
        .map(t => `${String(t.Task||'').trim()}|${String(t.Category||'').trim()}`)
  );

  const mTimeBase=Date.now();
  let skipped=0, errors=0;
  const tasksToUpload = [];

  for (let i=0;i<dataRows.length;i++) {
    const row=dataRows[i];
    const task=String(row[idxTask]??'').trim(); if(!task){errors++;continue;}
    const category=idxCategory>=0?String(row[idxCategory]??'').trim():'';
    const dueDate=idxDueDate>=0?formatImportDate(row[idxDueDate]):'';
    const priority=idxPriority>=0?(parseInt(row[idxPriority])||99):99;
    const note=idxNote>=0?String(row[idxNote]??'').trim():'';
    if (existingSet.has(`${task}|${category}`)){skipped++;continue;}
    const id=genID(); const mTime=mTimeBase+i;
    tasksToUpload.push({id,task,category,dueDate,priority,note,mTime,ID:id});
  }

  const added = tasksToUpload.length;
  let msg=`共 ${added} 筆待上傳`;
  if (skipped>0) msg+=`，略過重複 ${skipped} 筆`;
  if (errors>0) msg+=`，略過空白 ${errors} 筆`;
  resultEl.textContent=msg+'。上傳中…';

  if (added === 0) {
    resultEl.textContent=`無新資料（略過重複 ${skipped} 筆）`;
    if (importBtn) { importBtn.disabled=false; importBtn.style.opacity=''; }
    importProgressHide();  // v500.9: 收回進度條（避免卡在「比對資料中」）
    return;
  }

  // 步驟三：批次上傳到雲端（最多重試 3 次）
  importProgressShow(added);
  const sessionToken = getSession();
  let writtenIds = [], failedTasks = [];
  let uploadRetry = 0;
  const MAX_UPLOAD_RETRY = 3;

  while (uploadRetry < MAX_UPLOAD_RETRY) {
    const tasksBatch = uploadRetry === 0 ? tasksToUpload :
      tasksToUpload.filter(t => !writtenIds.includes(String(t.ID)));

    if (tasksBatch.length === 0) break;

    if (uploadRetry > 0) {
      importProgressError(`上傳部分失敗，30 秒後第 ${uploadRetry} 次重試...`);
      await new Promise(r => setTimeout(r, 30000));
      importProgressShow(tasksBatch.length);
      pushLog(`批次上傳第 ${uploadRetry + 1} 次重試（${tasksBatch.length} 筆）`, 'info');
    }

    try {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 60000);
      const res = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'batchAddTasks',
          token: sessionToken,
          tasks: tasksBatch.map(t=>({ID:t.ID,task:t.task,category:t.category,dueDate:t.dueDate,priority:t.priority,note:t.note,mTime:t.mTime}))
        }),
        signal: ctrl.signal
      });
      clearTimeout(tid);
      const json = await res.json();
      if (json.status === 'success') {
        writtenIds = [...new Set([...writtenIds, ...(json.written||[])])];
        failedTasks = tasksToUpload.filter(t => !writtenIds.includes(String(t.ID)));
        pushLog(`批次上傳：寫入 ${(json.written||[]).length} 筆，略過 ${(json.skipped||[]).length} 筆`, 'success');
        if (failedTasks.length === 0) break; // 全部成功
      } else {
        pushLog(`批次上傳失敗：${json.message||'未知錯誤'}（第 ${uploadRetry+1} 次）`, 'error');
      }
    } catch(e) {
      pushLog(`批次上傳錯誤：${e.name==='AbortError'?'請求超時':e.message}（第 ${uploadRetry+1} 次）`, 'error');
    }
    uploadRetry++;
  }

  // 超過最大重試次數，仍有失敗
  failedTasks = tasksToUpload.filter(t => !writtenIds.includes(String(t.ID)));
  if (uploadRetry >= MAX_UPLOAD_RETRY && failedTasks.length > 0) {
    importProgressError(`上傳失敗 ${failedTasks.length} 筆，請手動同步`);
    pushLog(`批次上傳連續 ${MAX_UPLOAD_RETRY} 次失敗，停止重試`, 'error');
    // 失敗的放回佇列，讓使用者手動觸發
    failedTasks.forEach(t => {
      pendingQueue.push({
        action:'addTask',
        payload:{id:t.ID,data:{task:t.task,category:t.category,dueDate:t.dueDate,priority:t.priority,note:t.note,mTime:t.mTime,ID:t.ID}},
        label:`匯入「${t.task}」`,
        addedAt:Date.now(),
        _opId: `op_${Date.now()}_${Math.random().toString(36).slice(2,8)}`
      });
    });
    saveQueue(); updateBanner();
    if (importBtn) { importBtn.disabled=false; importBtn.style.opacity=''; }
    return;
  }

  // 步驟四：更新本機 allT（只加入成功寫入的任務）
  writtenIds.forEach(id => {
    const t = tasksToUpload.find(x=>String(x.ID)===String(id));
    if (t && !allT.some(x=>String(x.ID)===String(id))) {
      allT.push({ID:t.ID,Task:t.task,Category:t.category,DueDate:t.dueDate,Status:'Pending',Priority:t.priority,Note:t.note,mTime:t.mTime});
    }
  });
  saveLocal(); renderAll();

  // 步驟五：pullFromCloud 驗證寫入結果
  importProgressShowVerify(writtenIds.length, added);
  await pullFromCloud('匯入驗證');

  // 驗證：檢查 writtenIds 是否都在雲端
  const cloudIds = new Set(allT.map(t=>String(t.ID)));
  const missingIds = writtenIds.filter(id=>!cloudIds.has(String(id)));

  if (missingIds.length > 0) {
    // 缺少的補回佇列，走 verifyFlushedOps 的重試機制（最多 3 次）
    missingIds.forEach(id => {
      const t = tasksToUpload.find(x=>String(x.ID)===String(id));
      if (t && !pendingQueue.some(q=>q.payload?.data?.ID===id)) {
        pendingQueue.push({
          action:'addTask',
          payload:{id:t.ID,data:{task:t.task,category:t.category,dueDate:t.dueDate,priority:t.priority,note:t.note,mTime:t.mTime,ID:t.ID}},
          label:`補回「${t.task}」`,
          addedAt:Date.now(),
          _opId: `op_${Date.now()}_${Math.random().toString(36).slice(2,8)}`
        });
      }
    });
    saveQueue(); updateBanner();
    importProgressVerifyDone(missingIds.length);
    pushLog(`驗證發現 ${missingIds.length} 筆未寫入，30 秒後自動重試`, 'warn');
    setTimeout(()=>{ if(pendingQueue.length&&isOnline()) schedulePush(true); }, 30000);
  } else {
    importProgressVerifyDone(0);
    let doneMsg=`匯入完成：新增 ${writtenIds.length} 筆`;
    if (skipped>0) doneMsg+=`，略過重複 ${skipped} 筆`;
    resultEl.textContent=doneMsg;
  }
  if (importBtn) { importBtn.disabled=false; importBtn.style.opacity=''; }
}
function formatImportDate(val) {
  if(!val) return '';
  const s=String(val).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  if (/^\d{5}$/.test(s)) { const d=new Date(Date.UTC(1899,11,30)+parseInt(s)*86400000); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  const d=new Date(s); if (!isNaN(d.getTime())) return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  return '';
}
function parseCsv(file) {
  return new Promise((resolve,reject)=>{
    const tryParse=(text)=>{ const rows=[]; let cur=[],field='',inQ=false; for(let i=0;i<text.length;i++){const c=text[i];if(inQ){if(c==='"'&&text[i+1]==='"'){field+='"';i++;}else if(c==='"')inQ=false;else field+=c;}else{if(c==='"')inQ=true;else if(c===','){cur.push(field);field='';}else if(c==='\n'||(c==='\r'&&text[i+1]==='\n')){if(c==='\r')i++;cur.push(field);rows.push(cur);cur=[];field='';}else field+=c;}}if(field||cur.length){cur.push(field);if(cur.some(f=>f))rows.push(cur);}return rows;};
    const isLikelyBig5=(buf)=>{ const bytes=new Uint8Array(buf.slice(0,512)); for(let i=0;i<bytes.length-1;i++){const b=bytes[i];if(b>=0x81&&b<=0xFE){const b2=bytes[i+1];if((b2>=0x40&&b2<=0x7E)||(b2>=0xA1&&b2<=0xFE))return true;}}return false;};
    const abReader=new FileReader();
    abReader.onload=e=>{ const buf=e.target.result; const encoding=isLikelyBig5(buf)?'Big5':'UTF-8'; const textReader=new FileReader(); textReader.onload=e2=>{try{resolve(tryParse(e2.target.result));}catch(err){reject(err);}};textReader.onerror=()=>reject(new Error('CSV 讀取失敗'));textReader.readAsText(file,encoding);};
    abReader.onerror=()=>reject(new Error('CSV 讀取失敗'));abReader.readAsArrayBuffer(file);
  });
}
function parseXlsx(file) {
  return new Promise((resolve,reject)=>{ if(window.XLSX){readXlsx(file,resolve,reject);return;} const script=document.createElement('script'); script.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js'; script.onload=()=>readXlsx(file,resolve,reject); script.onerror=()=>reject(new Error('無法載入 XLSX 解析器，請確認網路連線')); document.head.appendChild(script); });
}
function readXlsx(file,resolve,reject) {
  const reader=new FileReader();
  reader.onload=e=>{ try{ const wb=XLSX.read(e.target.result,{type:'array',cellDates:false,codepage:950,raw:false}); const ws=wb.Sheets[wb.SheetNames[0]]; const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false}); resolve(rows); }catch(err){reject(err);}};
  reader.onerror=()=>reject(new Error('Excel 讀取失敗')); reader.readAsArrayBuffer(file);
}

// v500: 改為純本機 filter，不發 HTTP 推送
// 雲端的清理由 GAS 端的 dailyCleanup() 每週二自動處理
function autoCleanDone() {
  const before = allT.length;
  allT = allT.filter(shouldKeep);
  const removed = before - allT.length;
  if (removed > 0) {
    saveLocal();
    pushLog(`本機隱藏 ${removed} 筆 6 個月前已完成任務`, 'info');
  }
}
