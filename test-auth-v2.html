<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宜修待辦 — 架構驗證原型 v2</title>
<style>
  body { font-family: system-ui, -apple-system, "Microsoft JhengHei", sans-serif;
         max-width: 480px; margin: 0 auto; padding: 16px; background: #f5f5f5; }
  .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px;
          box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  h1 { font-size: 1.2em; } h2 { font-size: 1em; color: #555; }
  button { padding: 10px 16px; border: none; border-radius: 8px; font-size: 1em;
           cursor: pointer; background: #2e7d32; color: #fff; margin-top: 4px; }
  button.secondary { background: #757575; }
  input[type=text], input[type=password] { padding: 10px; border: 1px solid #ccc;
          border-radius: 8px; font-size: 1em; width: 100%; box-sizing: border-box;
          margin-bottom: 8px; }
  ul { padding-left: 20px; } li { margin-bottom: 4px; }
  .ok { color: #2e7d32; } .err { color: #c62828; }
  .result { font-size: .9em; white-space: pre-wrap; margin-top: 8px;
            background: #f0f0f0; border-radius: 8px; padding: 8px; }
  img.preview { max-width: 120px; border-radius: 8px; margin-top: 8px; display: block; }
</style>
</head>
<body>
<h1>宜修待辦 — 架構驗證原型 v2</h1>

<div class="card">
  <h2>① 認證</h2>
  <div id="loggedOut"><button onclick="signIn()">使用 Google 登入</button></div>
  <div id="loggedIn" style="display:none">
    <p>登入者：<b id="userEmail"></b></p>
    <p>Drive 權杖：<b id="driveToken"></b></p>
    <button class="secondary" onclick="signOut()">登出</button>
  </div>
</div>

<div class="card" id="taskCard" style="display:none">
  <h2>② 資料寫入／讀取（RLS）</h2>
  <input type="text" id="taskTitle" placeholder="輸入任務名稱">
  <button onclick="addTask()">新增任務</button>
  <ul id="taskList"></ul>
</div>

<div class="card" id="driveCard" style="display:none">
  <h2>③ Drive 照片上傳</h2>
  <p style="font-size:.85em;color:#777">選照片 → 前端壓縮 → 上傳到你自己的 Drive</p>
  <input type="file" id="photoInput" accept="image/*">
  <button onclick="uploadPhoto()">壓縮並上傳</button>
  <div id="driveResult" class="result" style="display:none"></div>
  <img id="preview" class="preview" style="display:none">
</div>

<div class="card" id="aiCard" style="display:none">
  <h2>④ Gemini AI 測試</h2>
  <p style="font-size:.85em;color:#777">貼上你在 AI Studio 申請的 API Key</p>
  <input type="password" id="geminiKey" placeholder="AIza 開頭的 API Key">
  <button onclick="testGemini()">測試 AI（一句話建任務模擬）</button>
  <div id="aiResult" class="result" style="display:none"></div>
</div>

<div class="card"><h2>狀態</h2><div id="status">尚未初始化</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ====== 測試版常數(確認 key 完整) ====== */
const SUPABASE_URL = "https://vzrnkzokushqhixngrsi.supabase.co";
const SUPABASE_ANON_KEY = "貼上 test-todo 的 publishable key";
/* ======================================= */

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = id => document.getElementById(id);
const log = (m, ok = true) =>
  $("status").innerHTML = `<span class="${ok ? "ok" : "err"}">${m}</span>`;
let providerToken = null;

async function signIn() {
  const { error } = await db.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: location.origin + location.pathname,
      scopes: "https://www.googleapis.com/auth/drive.file",
      queryParams: { access_type: "offline", prompt: "consent" }
    }
  });
  if (error) log("登入啟動失敗：" + error.message, false);
}
async function signOut() { await db.auth.signOut(); location.reload(); }

async function addTask() {
  const title = $("taskTitle").value.trim();
  if (!title) return;
  const { error } = await db.from("tasks").insert({ title });
  if (error) { log("寫入失敗：" + error.message, false); return; }
  $("taskTitle").value = ""; log("寫入成功"); loadTasks();
}
async function loadTasks() {
  const { data, error } = await db.from("tasks")
    .select("id,title,status").order("updated_at", { ascending: false });
  if (error) { log("讀取失敗：" + error.message, false); return; }
  $("taskList").innerHTML = data.length
    ? data.map(t => `<li>${t.title} <small>(${t.status})</small></li>`).join("")
    : "<li><i>目前沒有任務</i></li>";
  log(`讀取成功，共 ${data.length} 筆`);
}

/* ---------- ③ Drive 上傳 ---------- */
function compressImage(file, maxSide = 1280, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
      const canvas = document.createElement("canvas");
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(b => b ? resolve(b) : reject(new Error("壓縮失敗")),
                    "image/jpeg", quality);
    };
    img.onerror = () => reject(new Error("圖片讀取失敗"));
    img.src = URL.createObjectURL(file);
  });
}

async function uploadPhoto() {
  const file = $("photoInput").files[0];
  if (!file) { log("請先選一張照片", false); return; }
  if (!providerToken) {
    log("沒有 Drive 權杖，請重新登入（權杖只在登入當下發放）", false); return;
  }
  try {
    log("壓縮中…");
    const blob = await compressImage(file);
    log(`壓縮完成：${(file.size/1024).toFixed(0)}KB → ${(blob.size/1024).toFixed(0)}KB，上傳中…`);

    const metadata = {
      name: `宜修_${new Date().toISOString().replace(/[:.]/g,"-")}.jpg`,
      mimeType: "image/jpeg"
    };
    const form = new FormData();
    form.append("metadata",
      new Blob([JSON.stringify(metadata)], { type: "application/json" }));
    form.append("file", blob);

    const res = await fetch(
      "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink",
      { method: "POST",
        headers: { Authorization: "Bearer " + providerToken },
        body: form });

    if (res.status === 401) {
      log("Drive 權杖已過期（發放後約 1 小時失效）。請登出再登入取得新權杖 — 這正是正式版要做自動刷新的原因。", false);
      return;
    }
    if (!res.ok) throw new Error("HTTP " + res.status + " " + await res.text());

    const data = await res.json();
    $("driveResult").style.display = "block";
    $("driveResult").innerHTML =
      `✔ 上傳成功\n檔案 ID：${data.id}\n檔名：${data.name}\n` +
      `<a href="${data.webViewLink}" target="_blank">在 Drive 開啟</a>`;
    $("preview").src = URL.createObjectURL(blob);
    $("preview").style.display = "block";
    log("Drive 上傳驗證通過。這個檔案 ID 就是未來存進 tasks 表的東西。");
  } catch (e) { log("上傳失敗：" + e.message, false); }
}

/* ---------- ④ Gemini 測試 ---------- */
async function testGemini() {
  const key = $("geminiKey").value.trim();
  if (!key) { log("請先貼上 Gemini API Key", false); return; }
  log("呼叫 Gemini 中…");
  try {
    const res = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + encodeURIComponent(key),
      { method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text:
            "把這句話轉成待辦任務，只回傳 JSON：{\"title\":...,\"customer\":...}。句子：明天下午幫可立穩換伺服器硬碟"
          }]}]
        }) });
    if (!res.ok) {
      const t = await res.text();
      if (res.status === 400 || res.status === 403)
        log("金鑰無效或未啟用：請確認 key 是否貼對", false);
      else if (res.status === 429)
        log("今日額度已用完（免費層每日重置）", false);
      else log("AI 呼叫失敗：HTTP " + res.status + "\n" + t, false);
      return;
    }
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "(無回應內容)";
    $("aiResult").style.display = "block";
    $("aiResult").textContent = text;
    log("Gemini 驗證通過 — 「一句話建任務」的核心鏈路已打通。");
  } catch (e) { log("AI 呼叫失敗：" + e.message, false); }
}

/* ---------- 初始化 ---------- */
async function init() {
  const { data: { session } } = await db.auth.getSession();
  if (session) {
    providerToken = session.provider_token || null;
    $("loggedOut").style.display = "none";
    $("loggedIn").style.display = "block";
    ["taskCard","driveCard","aiCard"].forEach(id => $(id).style.display = "block");
    $("userEmail").textContent = session.user.email;
    $("driveToken").textContent = providerToken ? "✔ 已取得" : "✘ 未取得（請重新登入）";
    loadTasks();
  } else {
    log("未登入。按上方按鈕以 Google 登入。");
  }
}
db.auth.onAuthStateChange((_e, s) => { if (s) init(); });
init();
</script>
</body>
</html>
